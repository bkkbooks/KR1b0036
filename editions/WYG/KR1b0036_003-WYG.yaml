body:
  text: 書傳會選卷三明劉三吾等撰商書契始封商湯因以為有天下之號書凡十七篇音釋傳契私列反字本作偰史記云黄帝之曽孫帝嚳生契又傳十三世生湯湯誓湯號也或曰諡湯名履姓子氏夏桀暴虐湯往征之亳衆憚於往役故湯喻以弔伐之意葢師興之時而誓于亳都者也今文古文皆有音釋傳諡神至反亳白各反王曰格爾衆庶悉聼朕言非台小子敢行稱亂有夏多罪天命殛之王曰者史臣追述之稱也格至台我稱舉也以人事言之則臣伐君可謂亂矣以天命言之則所謂天吏非稱亂也林氏曰非天吏而伐有罪猶不為士師而擅殺人也為天吏而不伐有罪猶為士師而故縱罪人也音釋經台音怡本篇及後諸篇竝同稱平聲今爾有衆汝曰我后不恤我衆舍我穡事而割正夏予惟聞汝衆言夏氏有罪予畏上帝不敢不正穡刈穫也割㫁也亳邑之民安於湯之徳政桀之虐焰所不及故不知夏氏之罪而憚伐桀之勞反謂湯不恤亳邑之衆舍我刈穫之事而㫁正有夏湯言我亦聞汝衆論如此然夏桀暴虐天命殛之我畏上帝不敢不往正其罪也音釋經舍音捨傳㫁都管反今汝其曰夏罪其如台夏王率遏衆力率割夏邑有衆率怠弗協曰時日曷喪予及汝皆亾夏徳若兹今朕必往遏絶也割劓割夏邑之割時是也湯又舉商衆言桀雖暴虐其如我何湯又應之曰夏王率為重役以窮民力嚴刑以殘民生民厭夏徳亦率皆怠於奉上不和於國疾視其君指日而曰是日何時而亡乎若亡則吾寧與之俱亡蓋苦桀之虐而欲其亡之甚也桀之惡徳如此今我之所以必徃也桀嘗自言吾有天下如天之有日日亡吾乃亡耳故民因以日目之音釋經喪去聲爾尚輔予一人致天之罰予其大賚汝爾無不信朕不食言爾不從誓言予則孥戮汝罔有攸赦賚與也食言言已出而反吞之也禹之征苗止曰爾尚一乃心力其克有勲至啓則曰用命賞於祖不用命戮於社予則孥戮汝此又益以朕不食言罔有攸赦亦可以觀世變矣陳氏櫟曰天生民而立之君使司牧之今桀虐其民民欲其速亡如此人心之所歸即天命之所在人心之所離即天命之所棄也天命湯伐之湯敢違天乎湯之誓師拳拳惟以天言曰天命殛之曰予畏上帝曰致天之罰非湯伐之天伐之也湯曰予畏上帝不敢不正武王曰予弗順天厥罪惟鈞其心一也堯舜之授受禹啟之𫝊繼湯武之征伐事雖不同其順乎天適乎時合乎義一而已矣仲虺之誥仲虺臣名奚仲之後為湯左相誥告也周禮士師以五戒先後刑罰一曰誓用之於軍旅二曰誥用之於㑹同以喻衆也此但告湯而亦謂之誥者唐孔氏謂仲虺亦必對衆而言蓋非特釋湯之慚而且以曉其臣民衆庶也古文有今文無音釋經虺許偉反說文作􅻰又作蘬作􅻰傳奚仲左傳哀公元年薛宰曰薛之皇祖奚仲為夏車正註奚仲為夏禹掌車服大夫仲虺奚仲之後也相去聲先先見反後胡茂反曉其臣民誥即告也上下可通用如召誥洛誥多以下告上亦名篇曰誥此篇自佑賢輔徳以下皆進戒之辭故亦曰誥不必言曉其臣民也成湯放桀於南巢惟有慚徳曰予恐來世以台為口實武功成故曰成湯南巢地名廬江六縣有居巢城桀奔于此因以放之也湯之伐桀雖順天應人然承堯舜禹授受之後於心終有所不安故愧其徳之不古若而又恐天下後世藉以為口實也陳氏曰堯舜以天下讓後世好名之主猶有不知而慕之者湯武征伐而得天下後世嗜利之人安得不以為口實哉此湯之所以恐也歟陳氏櫟曰觀湯之慚湯之本心見矣蓋以居萬世君臣之始變也仲虺釋其慚始則美之又慮其愧心既釋驕心或生故終後警之大臣引君當道如此音釋傳藉慈夜反好去聲仲虺乃作誥曰嗚呼惟天生民有欲無主乃亂惟天生聰明時乂有夏昬徳民墜塗炭天乃錫王勇智表正萬邦纘禹舊服兹率厥典奉若天命仲虺恐湯憂愧不已乃作誥以解釋其意歎息言民生有耳目口鼻愛惡之欲無主則爭且亂矣天生聰明所以為之主而治其爭亂者也墜陷也塗泥炭火也桀為民主而反行昏亂䧟民於塗泥既失其所以為主矣然民不可以無主也故天錫湯以勇智之徳勇足以有為智足以有謀非勇智則不能成天下之大業也表正者表正於此而影直於彼也天錫湯以勇智者所以使其表正萬邦而繼禹舊所服行也此但卒循其典常以奉順乎天而已天者典常之理所自出而典常者禹之所服行者也湯革夏而纘舊服武革商而政由舊孔子所謂百世可知正以是也孟子曰賊仁者謂之賊賊義者謂之殘殘賊之人謂之一夫聞誅一夫紂矣未聞弑君也夫立之君者懼民之殘賊而無以主之為之主而自殘賊焉則君之實䘮矣非一夫而何孟子之言則仲虺之意也音釋經纉作管反傳惡去聲治平聲夫立上音扶夏王有罪矯誣上天以布命于下帝用不臧式商受命用爽厥師矯與矯制之矯同誣罔臧善式用爽明師衆也天以形體言帝以主宰言桀知民心不從矯詐誣罔託天以惑其衆天用不善其所為用使文有商受命用使昭明其衆庶也吴氏曰用爽厥師續下簡賢附勢意不相貫疑有脱誤簡賢附勢寔繁有徒肇我邦于有夏若苗之有莠若粟之有秕小大戰戰罔不懼于非辜矧予之徳言足聴聞簡略繁多肇始也戰戰恐懼貌言簡賢附勢之人同惡相濟寔多徒衆肇我邦於有夏為桀所惡欲見翦除如苗之有莠如粟之有秕鋤治簸揚有必不相容之勢商衆小大震恐無不懼陷于非罪况湯之徳言則足人之聽聞尤桀所忌疾者乎以苗粟喻桀以莠秕喻湯特言其不容於桀而迹之危如此史記言桀囚湯於夏臺湯之危屢矣無道而惡有道勢之必至也葉賀孫問矧予之徳言足聴聞據古注作道徳善言竊意言足聴聞自當作一句讀言吾之徳言之足使人聴聞未知是否朱子曰是若然則傳内言則足人之聴聞亦當作一句是音釋經寔丞職反與實字異音同義莠以九反草似苗者秕卑履反音與七同不成粟者足或云周禮大司徒注給足陸氏云劉音子喻反故韻書子邁反下釋云足其不足曰足然陸氏於諸經中但足恭之足音將樹反而給足之足竝無音又案詩行露篇以屋獄足為韻則但如本音矣姑記於此傳所惡去聲下同治平聲夏臺史記索隠云獄名夏曰鈞臺皇甫謐云地名在陽翟惟王不邇聲色不殖貨利徳懋懋官功懋懋賞用人惟己改過不吝克寛克仁彰信兆民邇近殖聚也不近聲色不聚貨利若未足以盡湯之徳然此本原之地非純乎天徳而無一毫人欲之私者不能也本原澄澈然後用人處己而莫不各得其當懋茂也繁多之意與時乃功懋哉之義同言人之懋扵徳者則懋之以官人之懋於功者則懋之以賞用人惟己而人之有善者無不容改過不吝而己之不善者無不改不忌能於人不吝過於己合併為公私意不立非聖人其孰能之湯之用人處己者如此而於臨民之際是以能寛能仁謂之能者寛而不失於縱仁而不失於柔易曰寛以居之仁以行之君徳也君徳昭著而孚信於天下矣湯之徳足人聴聞者如此陳氏櫟曰六經言仁自克寛克仁始遂開萬世言仁之端仁者心之徳愛之理以心徳之體言則仁為體寛為用以愛之用言則寛以容人仁以愛人皆用也徳莫大於仁湯之克仁實自不邇不殖之無私欲始歟音釋經殖丞職反傳近巨靳反處上聲下同當去聲合音閤乃葛伯仇餉初征自葛東征西夷怨南征北狄怨曰奚獨後予攸徂之民室家相慶曰徯予后后來其蘇民之戴商厥惟舊哉葛國名伯爵也餉饋也仇餉與餉者為仇也葛伯不祀湯使問之曰無以供粢盛湯使亳衆往耕老弱饋餉葛伯殺其童子湯遂征之湯征自葛始也奚何徯待也蘇復生也西夷北狄言逺者如此則近者可知也湯師之未加者則怨望其來曰何獨後予其所往伐者則妻孥相慶曰待我后乆矣后來我其復生乎他國之民皆以湯為我君而望其來者如此天下之愛戴歸往於商者非一日矣商業之興蓋不在於鳴條之役也吕氏曰夏商之際君臣易位天下之大變然觀其征伐之時唐虞都俞揖遜氣象依然若存蓋堯舜禹湯以道相傳世雖降而道不降也音釋經葛居曷反漢志葛國在陳留寧陵縣葛鄉唐𨽻宋州東距南亳六十里經世書紀年云湯戊寅嵗征葛越十八年乙未伐桀傳粢音咨盛時征反復扶又反佑賢輔徳顯忠遂良兼弱攻昧取亂侮亡推亡固存邦乃其昌前既釋湯之慚此下因以勸勉之也諸侯之賢徳者佑之輔之忠良者顯之遂之所以善善也侮説文曰傷也諸侯之弱者兼之昧者攻之亂者取之亡者傷之所以惡惡也言善則由大以及小言惡則由小以所及大推亡者兼攻取侮也固存者佑輔顯遂也推彼之以亡固我之所以存邦國乃其昌矣音釋經推通回反傳惡惡上去聲下如字徳日新萬邦惟懐志自滿九族乃離王懋昭大徳建中于民以義制事以禮制心垂裕後昆予聞曰能自得師者王謂人莫己若者亡好問則裕自用則小徳日新者日新其徳而不已也志自滿者反是湯之盤銘曰茍日新日日新又日新其廣日新之義歟徳日新則萬邦雖廣而無不懐志自滿則九族雖親而亦離萬邦舉逺以見近也九族舉親以見踈也王其勉明大徳立中道於天下中者天下之所同有也然非君建之則民不能以自中而禮義者所以建中者也義者心之裁制禮者理之節文以義制事則事得其宜以禮制心則心得其正内外合徳而中道立矣如此則非特有以建中於民而垂諸後世者亦綽乎有餘裕矣然是道也必學焉而後至故又舉古人之言以為隆師好問則徳尊而業廣自賢自用者反是謂之自得師者真知己之不足人之有餘委心聴用而無拂逆之謂也孟子曰湯之於伊尹學焉而後臣之故不勞而王其湯之所以自得者歟仲虺言懐諸侯之道推而至於修徳檢身又推而至於能自得師夫自天子至於庶人未有捨師而能成者雖生知之聖亦必有師焉後世之不如古非特世道之降抑亦師道之不明也仲虺之論遡流而源要其極而歸諸能自得師之一語其可為帝王之大法也歟音釋經好去聲傳見形甸反下同夫音扶舍音捨要平聲嗚呼慎厥終惟其始殖有禮覆昬暴欽崇天道永保天命上文既勸勉之於是歎息言謹其終之道惟於其始圖之始之不謹而能謹終者未之有也伊尹亦言謹終於始事雖不同而理則一也欽崇者敬畏尊奉之意有禮者封殖之昏暴者覆亡之天之道也欽崇乎天道則永保其天命矣按仲虺之誥其大意有三先言天立君之意桀逆天命而天之命湯者不可辭次言湯徳足以得民而民之歸湯者非一日末言為君艱難之道人心合離之機天道福善禍滛之可畏以明今之受夏非以利己乃有無窮之恤以深慰湯而釋其慚仲虺之忠愛可謂至矣然湯之所慚恐來世以為口實者仲虺終不敢謂無也君臣之分其可畏如此哉音釋經分扶問反湯誥湯伐夏歸亳諸侯率職來朝湯作誥以與天下更始今文無古文有音釋傳朝馳遥反更平聲王歸自克夏至于亳誕告萬方誕大也亳湯所都在宋州穀熟縣王曰嗟爾萬方有衆明聴予一人誥惟皇上帝降衷于下民若有恒性克綏厥猷惟后皇大𠂻中若順也天之降命而具仁義禮智信之理無所偏倚所謂𠂻也人之禀命而得仁義禮智信之理與心俱生所謂性也猷道也由其理之自然而有仁義禮智信之行所謂道也以降𠂻而言則無有偏倚順其自然固有常性矣以禀受而言則不無清濁純雜之異故必待君師之職而後能使之安於其道也故曰克綏厥猷惟后夫天生民有欲以情言也上帝降𠂻于下民以性言也仲虺即情以言人之欲成湯原惟以明人之善聖賢之論互相發明然其意則皆言君道之係於天下者如此之重也音釋經恒胡登反傳行胡孟反夫音扶夏王滅徳作威以敷虐于爾萬方百姓爾萬方百姓罹其凶害弗忍荼毒竝告無辜于上下神祗天道福善禍淫降災于夏以彰厥罪言桀無有仁愛但為殺戮天下被其凶害如荼之苦如毒之螫不可堪忍稱寃於天地鬼神以冀其拯己屈原曰人窮則反本故勞苦倦極未嘗不呼天也天之道善者福之滛者禍之桀既滛虐故天降災以明其罪意當時必有災異之事如周語所謂伊洛竭而夏亡之類音釋經罹鄰知反荼音徒祇音祈傳螫施隻反蟲毒也呼去聲伊洛竭而夏亡韋昭云禹都陽城伊洛所近也肆台小子將天命明威不敢赦敢用𤣥牡敢昭告于上天神后請罪有夏聿求元聖與之戮力以與爾有衆請命肆故也故我小子奉將天命明威不敢赦桀之罪也𤣥牡夏尚黑未變其禮也神后后土也聿遂也元聖伊尹也音釋傳戮字當作勠古通用音六陸又音力彫反説文力周反并力也上天孚佑下民罪人黜伏天命弗僭賁若草木兆民允殖孚允皆信也僣差也賁文之著也殖生也上天信佑下民故夏桀竄亡而屈服天命無所僣差賁然若草木之敷榮兆民信乎其生殖矣音釋經賁彼義反傳差初加反俾予一人輯寧爾邦家兹朕未知獲戾于上下慄慄危懼若將隕于深淵輯和戾罪隕墜也天使我輯寧爾邦家其付予之重恐不足以當之未知己得罪於天地與否驚恐憂畏若將墜於深淵蓋責愈重則憂愈大也音釋傳子音與凡我造邦無從匪􅂜無即慆淫各守爾典以承天休夏命已黜湯命維新侯邦雖舊悉與更始故曰造邦彞法即就慆慢也匪􅂜指法度言慆淫指逸樂言典常也各守其典常之道以承天之休命也音釋經造在早反慆他刀反傳更平聲樂音洛爾有善朕弗敢蔽罪當朕躬弗敢自赦惟簡在上帝之心其爾萬方有罪在予一人予一人有罪無以爾萬方簡閱也人有善不敢以不達已有罪不敢以自恕簡閲一聴於天然天以天下付之我則民之有罪實君所為君之有罪非民所致非特聖人厚於責己而薄於責人是乃理之所在君道當然也林氏曰上天降𠂻于民而以克綏厥猷付之一人為君者必使天下之人皆不失其降𠂻之性以安厥猷方無負於天之所付若民有罪是為君者教之不至所以自棄於愚不肖之地而莫能返非民之罪乃君之罪所以曰罪在朕躬也陳氏櫟曰此所以繳結篇首降𠂻有性綏猷之言深味之成湯可謂知君師之職矣音釋傳自恕朱子大學或問云恕字可施於人不可施于己以自恕訓自赦似亦未的嗚呼尚克時忱乃亦有終忱信也歎息言庶幾能於是而忱信焉乃亦有終也吴氏曰此兼人己而言音釋經忱時任反伊訓訓導也太甲嗣位伊尹作書訓導之史録為篇今文無古文有惟元祀十有二月乙丑伊尹祠于先王奉嗣王祗見厥祖侯甸羣后咸在百官總己以聴冢宰伊尹乃明言烈祖之成徳以訓于王夏曰嵗商曰祀周曰年一也元祀者太甲即位之元年十二月者商以建丑為正故以十二月為正也乙丑日也不繫以朔者非朔日也三代雖正朔不同然皆以寅月起數蓋朝覲會同班厯授時則以正朔行事至於紀月之數則皆以寅為首也伊姓尹字也伊尹名摰祠者告祭於廟也先王湯也冢長也禮有冢子冢婦之名周人亦謂之冢宰古者王宅憂祠祭則冢宰攝而告廟又攝而臨羣臣太甲服仲壬之喪伊尹祠于先王奉太甲以即位改元之事祗見厥祖則攝而告廟也侯服甸服之羣后咸在百官總己之職以聴冢宰則攝而臨羣臣也烈功也商頌曰衎我烈祖太甲即位改元伊尹於祠告先王之際明言湯之成徳以訓太甲此史官叙事之始辭也或曰孔氏言湯崩踰月太甲即位則十二月者湯崩之年建子之月也豈改正朔而不改月數乎曰此孔氏惑於序書之文也太甲繼仲壬之後服仲壬之䘮而孔氏曰湯崩奠殯而告固已誤矣至於改正朔而不改月數則於經史尤可攷周建子矣而詩言四月維夏六月徂暑則寅月起數周未嘗改也秦建亥矣而史記始皇三十一年十二月更名臘曰嘉平夫臘必建丑月也秦以亥正則臘為三月云十二月者則寅月起數秦未嘗改也至三十七年書十月癸丑始皇出遊十一月行至雲夢繼書七月丙寅始皇崩九月葬酈山先書十月十一月而繼書七月九月者知其以十月為正朔而寅月起數未嘗改也且秦史制書謂改年始朝賀皆自十月朔夫秦繼周者也若改月數則周之十月為建酉月矣安在其為建亥乎漢初史氏所書舊例也漢仍秦正亦書曰元年冬十月則正朔改而月數不改亦已明矣且經曰元祀十有二月乙丑則以十二月為正朔而改元何疑乎惟其以正朔行事也故後乎此者復政厥辟亦以十二月朔奉嗣王歸于亳蓋祠告復政皆重事也故皆以正朔行之孔氏不得其説而意湯崩踰月太甲即位奠殯而告是以崩年改元矣蘇氏曰崩年改元亂世事也不容在伊尹而有之不可以不辨又按孔氏以為湯崩吴氏曰殯有朝夕之奠何為而致祠主䘮者不離於殯側何待於祗見蓋太甲之為嗣王嗣仲壬而王也太甲太丁之子仲壬其叔父也嗣叔父而王而為之服三年之䘮為之後者為之子也太甲既即位於仲壬之柩前方居憂於仲壬之殯側伊尹乃至商之祖廟徧祠商之先王而以立太甲告之不言太甲祠而言伊尹䘮三年不祭也奉太甲徧見商之先王而獨言祗見厥祖者雖徧見先王而尤致意於湯也亦猶周公金縢之冊雖徧告三王而獨眷眷於文王也湯既已祔于廟則是此書初不廢外丙仲壬之事但此書本為伊尹稱湯以訓太甲故不及外丙仲壬之事餘見書序音釋經見形甸反侯甸羣后此言侯甸則是禹貢五服之制至是已改為九服矣傳繫音計寅延知反音與夷同又夷真反説見堯典篇數雙遇反下同朝馳遥反下同正朔正謂子丑寅月也朔月一日也日月相合故曰合朔史記厯書註云以建子為正故以夜半為朔若建寅為正則以平旦為朔是三代改正亦改朔也今按日月之合遲速有定期朔豈可改必會朝𤼵命用此時而已尹字東齋陳氏云三代而上未聞有以字傳者且其自穪曰尹躬則非字明矣孔䟽據孫子及吕覽三名摰或自有兩名或更名耳長上聲䘮平聲下竝同衎空旱反更平聲夫音扶下同酈音驪離去聲而為去聲下本為同曰嗚呼古有夏先后方懋厥德罔有天災山川鬼神亦莫不寧暨鳥獸魚鼈咸若于其子孫弗率皇天降災假手于我有命造攻自鳴條朕載自亳詩曰殷監不逺在夏后之世商之所宜監者莫近於夏故首以夏事告之也率循假借也有命有天命者謂湯也桀不率循先王之道故天降災借手與我成湯以誅之夏之先后方其懋徳則天之眷命如此及其子孫弗率而覆亡之禍又如此太甲不知率循成湯之徳則夏桀覆亡之禍亦可監矣載始也嗚條夏所宅也亳湯所宅也言造可攻之釁者由桀積惡於鳴條而湯徳之修則始於亳都也音釋經載如字傳監音鑒惟我商王布昭聖武代虐以寛兆民允懐布昭敷著也聖武猶易所謂神武而不殺者湯之徳威敷著于天下代桀之虐以吾之寛故天下之民信而懐之也今王嗣厥徳罔不在初立愛惟親立敬惟長始于家邦終于四海初即位之初言始不可以不謹也謹始之道孝悌而已孝悌者人心之所同非必人人教詔之立植也立愛敬於此而形愛敬於彼親吾親以及人之親長吾長以及人之長始于家達于國終而措之天下矣孔子曰立愛自親始教民睦也立敬自長始教民順也音釋經長上聲嗚呼先王肇修人紀從諫弗咈先民時若居上克明為下克忠與人不求僃檢身若不及以至于有萬邦兹惟艱哉人紀三綱五常孝敬之實也上文欲太甲立其愛故故此言成湯之所修人紀者如下文所云也綱常之理未嘗泯沒桀廢棄之而湯始修復之也咈逆也先民猶前輩舊徳也從諫不逆先民是順非誠於樂善者不能也居上克明言能盡臨下之道為下克忠言能盡事上之心吕氏曰湯之克忠最為難看湯放桀以臣易君豈可為忠不知湯之心最忠者也天命未去人心未離事桀之心曷嘗斯須替哉與人之善不求其􅍯檢身之誠有若不及其處上下人己之間又如此是以徳日以盛業日以廣天命歸之人心載之由七十里而至于有萬邦也積累之勤兹亦難矣伊尹前既言夏失天下之易此又言湯得天下之難太甲可不思所以繼之哉音釋傳樂音洛臣易夷益反處上聲敷求哲人俾輔于爾後嗣敷廣也廣求賢哲使輔爾後嗣也制官刑儆于有位曰敢有恒舞于宫酣歌于室時謂巫風敢有殉于貨色恒于遊畋時謂滛風敢有侮聖言逆忠直逺耆徳比頑童時謂亂風惟兹三風十愆卿士有一于身家必䘮邦君有一于身國必亡臣下不匡其刑墨具訓于蒙士官刑官府之刑也巫風者常歌常舞若巫覡然滛過也過而無度也比昵也倒置悖理曰亂好人之所惡惡人之所好也風風化也三風愆之綱也十愆風之目也卿士諸侯十有其一己䘮其家亡其國矣墨墨刑也臣下而不能匡正其君則以墨刑加之具詳悉也童蒙始學之人則詳悉以是訓之欲其入官而知所以正諫也異時太甲欲敗度縱敗禮伊尹先見其微故拳拳及此音釋經恒胡登反下同殉松潤反逺于願反耆渠伊反按説文耆從老從㫖則下當從日但此章及文侯之命詩耆而艾禮記耆指使耆老周禮伊耆氏之類古註本皆從目唐張參五經文字云下從目者非比毗至反䘮去聲傳覡刑狄反男曰覡女曰巫倒刀號反好惡並去聲嗚呼嗣王祗厥身念哉聖謨洋洋嘉言孔彰惟上帝不常作善降之百祥作不善降之百殃爾惟徳罔小萬邦惟慶爾惟不徳罔大墜厥宗歎息言太甲當以三風十愆之訓敬之於身念而勿忘也謨謂其謀言謂其訓洋大孔甚也言其謀訓大明不可忽也不常者去就無定也為善則降之百祥為惡則降之百殃各以類應也勿以小善而不為萬邦之慶積於小勿以小惡而為之厥宗之墜不在大蓋善必積而後成惡雖小而可懼此總結上文而又以天命人事禍福申戒之也新安陳氏曰此篇伊訓太甲於即位之初始終以興亡寓勸戒夏以懋徳興桀以弗率亡初意明矣繼以湯以聖武興而欲太甲以愛敬之良心嗣厥徳勸之也繼以湯以艱難興而防太甲以縱欲之私心敗厥徳戒之也末章作善降祥爾徳之惟慶勸之保其所以興作不善之降殃不徳之墜宗戒之䧟於所以亡而提綱挈領則在祗厥身之一言能祗敬其身則嗣祖徳而興不能祗敬其身則背祖徳而亡言言忠愛蓋已豫為太甲憂矣但猶包涵未明言之未如太甲篇痛切爾太甲上商史録伊尹告戒節次及太甲往復之辭故三篤相屬成文其間或附史臣之語以貫篇意若史家紀傳之所載也唐孔氏曰伊訓肆命徂后大甲咸有一徳皆是告戒太甲不可皆名伊訓故随事立稱也此篇亦訓體今文無古文有音釋傳屬音燭傳柱戀反稱平聲惟嗣王不惠于阿衡惠順也阿倚衡平也阿衡商之官名言天下之所倚平也亦曰保衡或曰伊尹之號史氏録伊尹之書先此以發之音釋經阿於何反傳阿倚孔疏云古人讀阿倚同音故阿為倚也伊尹作書曰先王顧諟天之明命以承上下神祇社稷宗廟罔不祗肅天監厥徳用集大命撫綏萬方惟尹躬克左右厥辟宅師肆嗣王丕承基緒顧常目在之也諟古是字明命者上天顯然之理而命之我者在天為明命在人為明徳伊尹言成湯常目在是天之明命以奉天地神祗社稷宗廟無不敬肅故天視其徳用集大命以有天下撫安萬邦我又身能左右成湯以居民衆故嗣王得以大承其基業也陳氏曰此言太甲今日之有天下由先王明徳以得天命伊尹身任重以輔先王也有先王創業之祖與尹開國之大臣是以嗣王得承此大業今日豈可忘先生而不念忽尹言而不從哉音釋經監音鑒左右音佐佑辟必益反音與璧同下章並同惟尹躬先見于西邑夏自周有終相亦惟終其後嗣王罔克有終相亦罔終嗣王戒哉祗爾厥辟辟不辟忝厥祖夏都安邑在亳之西故曰西邑夏金氏曰自周當作自君君字篆文似周故誤作周夏之先王有終故其輔相者亦能有終其後夏桀不能有終故其輔相者亦不能有終嗣王其以夏桀為戒哉當敬爾所以為君之道君而不君則忝辱成湯矣太甲之意必謂伊尹足以任天下之重我雖縱欲未必遽至危亡故伊尹以相亦罔終之言深折其私而破其所恃也音釋經先見並如字自周朱子語録云二字不可曉或云周當作君篆文相似而誤也相去聲下同王惟庸罔念聞庸常也太甲惟若尋常於伊尹之言無所念聴此史記之言音釋經庸朱子語録云六字只作一句讀庸如王庸作書之庸為是伊尹乃言曰先王昧爽丕顯坐以待旦旁求俊彦啓迪後人無越厥命以自覆昧晦爽明也昧爽云者欲明未明之時也丕大也顯亦明也先王於昧爽之時洗濯澡雪大明其徳坐以待旦而行之也旁求者求之非一方也彦美士也言湯孜孜為善不遑寧處如此而又旁求俊彦之士以開導子孫太甲毋顛越其命以自取覆亡也音釋傳澡子皓反慎乃儉徳惟懐永圖太甲欲敗度縱敗禮蓋奢侈失之而無長逺之慮者伊尹言當謹其儉約之徳惟懐永乆之謀以約失之者鮮矣此太甲受病之處故伊尹特言之音釋傳鮮上聲若虞機張往省括于度則釋欽厥止率乃祖攸行惟朕以懌萬世有辭虞虞人也機弩牙也括矣括也度法度射者之所準望者也釋發也言若虞人之射弩機既張必往察其括之合於法度然後發之則發無不中矣欽者肅恭収歛止見虞書率循也欽厥止者所以立本率乃祖者所以致用所謂省括于度則釋也王能如是則動無過舉近可以慰悦尹心逺可以有譽於後世矣安汝止者聖君之事生而知者也欽厥止者賢君之事學而知者也音釋經省息井反括古活反傳矢括孔䟽云矢末也説文云矢括築絃處新安程泰之云矢之尾末岐而銜弦處也中去聲王未克變不能變其舊習也此亦史臣之言伊尹曰兹乃不義習與性成予弗狎于弗順營于桐宫密邇先王其訓無俾世迷狎習也弗順者弗順義理之人也桐成湯墓陵之地伊尹指太甲所為乃不義之事習惡而性成者也我不可使其狎習不順義理之人於是營宫于桐使親近成湯之墓朝夕哀思興起其善以是訓之無使終身迷惑而不誤也王徂桐宫居憂克終允徳徂往允信也有諸己之謂信實有其徳於身也凡人之不善必有從㬰以導其為非者太甲桐宫之居伊尹既使其密邇先王陵墓以興發其善心又絶其比昵之黨而革其汚染此其所以克終允徳也次篇伊尹言嗣王克終厥徳又曰允徳協于下故史氏言克終允徳結此篇以發次篇之義陳氏曰伊尹此舉蓋處君臣之變者知太甲之性不過中人平日誘以為惡之近習必多而輔以為善之大臣尹之外無聞焉孤忠不能勝引誘之衆徒言不能開迷惑之人遂營桐以居之如見先生之在前而無羣小之在側善心油然以生而汚習脫然以除此不言之教逹變之權惟自任以天下之重如尹之開國元老大臣至公者能之而非泛然之大臣所敢為也乂按千古性學開端於若有恒性之一言其次則習與性成之言也恒性以天地之性言習與性成以氣質之性言天地之性氣質之性雖至橫渠張氏始剖判言之然已肇端于湯尹言性之初矣音釋傳從㬰上子勇反下音勇勸也序書作慫慂比毗至反昵尼質反汚音烏太甲中惟三祀十有二月朔伊尹以冕服奉嗣王歸于亳太甲終喪明年之王朔也冕冠也唐孔氏曰周禮天子六冕備物盡文惟衮冕耳此蓋衮冕之服義或然也奉迎也喪既除以衮冕吉服奉迎以歸也作書曰民非后罔克胥匡以生后非民罔以辟四方皇天眷佑有商俾嗣王克終厥徳實萬世無疆之休民非君則不能相正以生君非民則誰與為君者言民固不可無君而君尤不可失民也太甲改過之初伊尹首發此義其喜懼之意深矣夫太甲不義有若性成一日翻然改悟是豈人力所至葢天命眷商隂誘其衷故嗣王能終其徳也向也湯緒幾墜今其自是有永豈不為萬世無疆之休乎音釋經辟必益反傳夫音扶王拜手稽首曰予小子不明于徳自底不類欲敗度縱敗禮以速戾于厥躬天作孽猶可違自作孽不可逭既往背師保之訓弗克于厥初尚賴匡救之徳圖惟厥終拜手首至手也稽首首至地也太甲致敬於師保其禮如此不類猶不肖也多欲則興作而亂法度縱肆則放蕩而隳禮義度就事言之也禮就身言之也速召之急也戾罪孽災逭逃也既往已往也已往既不信伊尹之言不能謹之于始庶幾正救之力以圖惟其終也當太甲不惠阿衡之時伊尹之言惟恐太甲不聼及太甲改過之後太甲之心惟恐伊尹不言夫太甲固困而知之者然昔之迷今之復昔之晦今之明如日月昏蝕一復其舊而光采炫燿萬景俱新湯武不可及已豈居成王之下乎音釋經敗北邁反下同孽魚列反字今作􅖈㜸古通用逭胡玩反背音佩傳夫音扶炫熒絹反伊尹拜手稽首曰修厥身允徳協于下惟明后伊尹致敬以復太甲也修身則無敗度敗禮之事允徳則有誠身誠意之實徳誠于上協和于下惟明后然也先王子惠困窮民服厥命罔有不悦並其有邦厥鄰乃曰徯我后后來無罰此言湯徳所以協下者困窮之民若已子而惠愛之惠之若子則心之愛者誠矣未有誠而不動者也故民服其命無有不得其懽心當時諸侯竝湯而有國者其鄰國之民乃以湯為我君曰待我君我君來其無罰乎言除其殘虐湯之得民心也如此即仲虺后來其蘇之意王懋乃徳視乃厥祖無時豫怠湯之盤銘曰茍日新日日新又日新湯之所以懋其徳者如此太甲亦當勉於其徳視烈祖之所為不可頃刻而逸豫怠惰也奉先思孝接下思恭視逺惟明聴徳惟聰朕承王之休無斁思孝則不敢違其祖思恭則不敢忽其臣惟亦思也思明則所視者逺而不蔽於淺近思聰則所聼者徳而不惑於憸邪此懋徳之所從事者太甲能是則我承王之美而無所厭斁也陳氏大猷曰孝恭聰明懋徳之目人君修徳必自受病處藥之太甲前日覆湯典刑不惠阿衡由不思孝思恭也既立不明背棄師訓由視溺於近聼惑於邪也今盡此四者病去而徳成矣尹恥君不及堯舜太甲徳成尹責始盡是承王美於無窮也陳氏大猷曰伊訓作於太甲未有過之先尹欲預防其縱故其辭嚴太甲上篇作于太甲有過之時尹不欲激之而㣲轉其機故其辭婉中篇作於悔過之初尹深自喜慰故其辭温下篇作於改過之後尹慮其或不克終故其辭深以厲大臣格言淺深有序故如此音釋經斁音亦傳憸思亷仄太甲下伊尹申誥于王曰嗚呼惟天無親克敬惟親民罔常懐懐于有仁鬼神無常享享于克誠天位艱哉申誥重誥也天之所親民之所懐鬼神之所享皆不常也惟克敬克仁克誠而後天親之民懐之鬼神享之也曰敬曰仁曰誠者各因所主而言也天謂之敬者天者理之所在動靜語黙不可有一毫之慢民謂之仁者民非元后何戴鰥寡孤獨皆人君所當恤鬼神謂之誠者不誠無物誠立於此而後神格於彼三者所當盡如此人君居天之位其可易而為之哉分而言之則三合而言之一徳而已太甲遷善未幾而伊尹以是告之其才固有大過人者歟吕氏曰君必上得天心下得民心幽得鬼神之心始可以當天位天位所以惟艱也音釋傳重儲用反易以䜴反幾居豨反徳惟治否徳亂與治同道罔不興與亂同事罔不亡終始慎厥與惟明明后徳者合敬仁誠之稱也有是徳則治無是徳則亂治固古人有行之者矣亂亦古人有行之者也與古之治者同道則無不興與古之亂者同事則無不亡治而謂之道者蓋治因時制宜或損或益事未必同而道則同也亂而謂之事者亡國䘮家不過貨色遊畋作威殺戮等事事同道無不同也治亂之分顧所與何如耳始而與治固可以興終而與亂則亡亦至矣謹其所與終始如一惟明明之君則然也上篇言惟明后此篇言惟明明后蓋明其所已明而進乎前者矣真氏曰道指全體而言如堯舜之仁湯武之義是也事指一事而言太康遊畋桀紂暴虐之類是也必同道乃興宋襄公以不禽二毛自比文王不知一事之同而他事之不副其能興乎苛同事必亡三風十愆或有其一無不亡者興之難而亡之易如此斯天位之所以艱歟音釋經治去聲下同否俯久反先王惟時懋敬厥徳克配上帝今王嗣有令緒尚監兹哉敬即克敬惟親之敬舉其一以包其二也成湯勉敬其徳德與天合故克配上帝今王嗣有令緒庶幾其監視此也音釋經令去聲監音鑒若升髙必自下若陟遐必自邇此告以進德之序也中庸論君子之道亦謂譬如行逺必自邇譬如登高必自卑進德修業之喻未有如此之切者吕氏曰自此乃伊尹畫一以告太甲也無輕民事惟難無安厥位惟危無毋通毋輕民事而思其難毋安君位而思其危慎終于始人情孰不欲善終者特安於縱欲以為今日姑若是而他日固改之也然始而不善而能善其終者寡矣桐宫之事往已今其即政臨民亦事之一初也有言逆于汝心必求諸道有言遜于汝志必求諸非道鯁直之言人所難受巽順之言人所易從於其所難受者必求諸道不可遽以逆于心而拒之於其所易從者必求諸非道不可遽以遜于志而聴之以上五事蓋欲太甲矯乎情之偏也陳氏大猷曰忘其言之順逆而揆諸道之當否合道則逆者乃所以為遜非道則遜者乃所以為逆前日欲縱之時尹之言固嘗逆心而臣下之言固嘗有遜志者矣故復以為戒音釋經鯁古杏反嗚呼弗慮胡獲弗為胡成一人元良萬邦以貞胡何也弗慮何得欲其謹思之也弗為何成欲其篤行之也元大良善貞正也一人者萬邦之儀表一人元良則萬邦以正矣君罔以辯言亂舊政臣罔以寵利居成功邦其永孚于休弗思弗為安於縱弛先王之法廢矣能思能為作其聰明先王之法亂矣亂之為害甚於廢也成功非寵利之所可居者至是太甲徳已進伊尹有退休之志矣此咸有一德之所以繼作也君臣各盡其道邦國永信其休美也呉氏曰上篇稱嗣王不惠于阿衡必其言有與伊尹背違者辯言亂政或太甲所失在此罔以寵利居成功己之所自處者已素定矣下語既非泛論則上語必有為而𤼵也陳氏曰老氏曰功成而不居蔡澤曰四時之序功成者去伊尹聖之任者也耕莘之初天下何與於我自幡然從湯以後則以身任責不容釋矣不幸湯崩主少不明幾覆商􅍈身任托孤愈不容釋矣大不得已置君於桐不容不犯臣子之至難非可諉其責於他人也觀其告戒拳拳言言忠愛必以先王尹躬對言幸而太甲悔過修徳遂亟復政於君奉身而退尹至是上無負於先王次無負於太甲下無負於天下以身任重可以釋矣由其任重恐恐不勝之身而復還其耕莘囂囂自得之身其欣幸當何如哉此而不退寧無貪戀寵利之疑置君於桐大不獲己之本心誰白之者伊可謂自任之重自處之審矣使湯有太甲為之孫而無伊尹為之佐其不一再傳而覆者幾希尚何六百年之敢望哉音釋傳背音佩有為去聲咸有一徳伊尹致仕而去恐太甲德不純一及任用非人故作此篇亦訓體也史氏取其篇中咸有一德四字以為篇目今文無古文有伊尹既復政厥辟將告歸乃陳戒于徳伊尹已還政太甲將告老而歸私邑以一德陳戒其君此史氏本序音釋經辟必益反曰嗚呼天難諶命靡常常厥徳保厥位厥徳靡常九有以亡諶信也天之難信以其命之不常也然天命雖不常而常於有德者君德有常則天命亦常而保厥位矣君德不常則天命亦不常而九有以亡矣九有九州也音釋經諶時壬反夏王弗克庸徳慢神虐民皇天弗保監于萬方啓迪有命眷求一徳俾作神主惟尹躬暨湯咸有一徳克享天心受天明命以有九有之師爰革夏正上文言天命無常惟有德則可常於是引桀之所以失天命湯之所以得天命者證之一德純一之德不雜不息之義即上文所謂常德也神主百神之主享當也湯之君臣咸有一德故能上當天心受天明命而有天下於是改夏建寅之正而為建丑正也陳氏櫟曰臣當先君後己善則稱君今曰尹躬暨湯則臣先君曰咸有一徳則臣儕於君何也蓋尹聖之任湯學焉而後臣天生齊聖之湯又生元聖之尹君臣同德聖聖相逢非汎然君臣比也又何區區形迹之嫌哉音釋經監音鑒非天私我有商惟天佑于一徳非商求于下民惟民歸于一徳上言一徳故得天得民此言天佑民歸皆以一德之故蓋反復言之音釋傳復音腹徳惟一動罔不吉徳二三動罔不凶惟吉凶不僭在人惟天降災祥在徳二三則雜矣德之純則無徃而不吉德之雜則無徃而不凶僣差也惟吉凶不差在人者惟天之降災祥在德故也今嗣王新服厥命惟新厥徳終始惟一時乃日新太甲新服天子之命德亦當新然新德之要在於有常而已終始有常而無間㫁是乃所以日新也音釋傳間去聲㫁徒玩反任官惟賢材左右惟其人臣為上為徳為下為民其難其慎惟和惟一賢者有德之稱材者能也左右者輔弼大臣非賢材之稱可盡故曰惟其人夫人臣之職為上為德左右厥辟也為下為民所以宅師也不曰君而曰德者兼君道而言也臣職所係其重如此是必其難其慎難者難於任用慎者慎於聴察所以防小人也惟和惟一和者可否相濟一者終始如一所以任君子也音釋經任如鴆反左右上臧可反下云九反音與有同與左右厥辟不同音為並去聲陸氏音為上為民之為去聲為德為下之為平聲蔡傳無明文朱子語録云並當作去聲夫音扶左右厥辟左音佐右音佑徳無常師主善為師善無常主協于克一上文言用人因推取人為善之要無常者不可執一之謂師法協合也德者善之總稱善者德之實行一者其本原統會者也德兼衆善不主於善則無以得一本萬殊之理善原於一不協于一則無以達萬殊一本之妙謂之克一者能一之謂也博而求之於不一之善約而會之於至一之理此聖學始終條理之序與夫子所謂一貫者幾矣太甲至是而得與聞焉亦異乎常人之改過者歟張氏曰虞書精一數語之外惟此為精密陳氏櫟曰理之一本萬殊處擇之貴乎精理之萬殊一本處融之貴乎一徳無常師主善為師精以擇之也即所謂惟精也善無常主協于克一一以貫之也即所謂惟一也南軒謂精一數語外惟此最為精密伊尹此言即自惟精惟一充廣言之也伊尹樂堯舜之道今復摘其授受㣲㫖以告太甲其欲使君堯舜之心至老而不變也蓋如此音釋傳行胡孟反幾音機與去聲俾萬姓咸曰大哉王言又曰一哉王心克綏先王之禄永底烝民之生人君惟其心之一故其𤼵諸言也大萬姓見其言之大故能知其心之一感應之理自然而然以見人心之不可欺而誠之不可掩也禄者先王所守之天禄也烝衆也天禄安民生厚一徳之效驗也音釋傳以見形甸反嗚呼七世之廟可以觀徳萬夫之長可以觀政天子七廟三昭三穆與太祖之廟七七廟親盡則遷必有德之主則不祧毁故曰七世之廟可以觀德天子居萬民之上必政教有以深服乎人而後萬民悦服故曰萬夫之長可以觀政伊尹歎息言德政修否見於後世服乎當時有不可掩者如此音釋經長上聲傳昭如字音韶非避晉諱改也祧他彫反遷廟也見形甸反后非民罔使民非后罔事無自廣以狹人匹夫匹婦不獲自盡民主罔與成厥功罔使罔事即上篇民非后罔克胥匡以生后非民罔以辟四方之意申言君民之相須者如此欲太甲不敢忽也無毋同伊尹又言君民之使事雖有貴賤不同至於取人為善則初無貴賤之間蓋天以一理賦之於人散為萬善人君合天下之萬善而後理之一者可全也茍自大而狹人匹夫匹婦有一不得自盡於上則一善不備而民主亦無與成厥功矣伊尹於篇終致其警戒之意而言外之㫖則又推廣其所謂一者如此葢道體之純全聖功之極致也嘗因是言之以為精粹無雜者一也終始無間者一也該括萬善者一也一者通古今達上下萬化之原萬事之幹語其理則無二語其運則無息語其體則并包而無所遺也咸有一徳之書而三者之義悉備前乎伏犧堯舜禹湯後乎文武周公孔子同一揆也音釋經盡子忍反又在忍反傳間去聲下同并平聲盤庚上盤庚陽甲之弟自祖乙都耿圮於河水盤庚欲遷於殷而大家世族安土重遷胥動浮言小民雖蕩析離居亦惑於利害不適有居盤庚喻以遷都之利不遷之害上中二篇未遷時言下篇既遷後言王氏曰上篇告羣臣中篇告庻民下篇告百官族姓左傳謂盤庚之誥實誥體也三篇今文古文皆有但今文三篇合為一史記盤庚祖乙之曽孫也厯祖乙子祖辛祖辛子開甲開甲弟祖丁開甲子南庚祖丁子陽甲及盤庚凡七世都耿矣亳殷亳之殷地也亳殷之别名在河南耿在河北音釋經盤陸云本又作般傳陽甲湯八世孫祖乙之子自盤庚又傳八王至武乙復遷河北盤庚遷于殷民不適有居率籲衆慼出矢言殷在河南偃師適往籲呼矢誓也史臣言盤庚欲遷于殷民不肯往適有居盤庚率呼衆憂之人出誓言以喻之如下文所云也周氏曰商人稱殷自盤庚始自此以前惟稱商自盤庚遷都之後于是殷商兼稱或只稱殷也音釋經籲音喻傳呼去聲下同曰我王來既爰宅于兹重我民無盡劉不能胥匡以生卜稽曰其如台曰盤庚之言也劉殺也盤庚言我先王祖乙來都於耿固重我民之生非欲盡致之死也民適不幸蕩析離居不能相救以生稽之於卜亦曰此地無若我何言耿不可居决當遷也陳氏櫟曰既爰宅于兹茲指耿邑當有述水患之語然後繼以重我民無盡劉方近人情其如台疑令龜之詞比句上下疑有闕文音釋經盡子忍反先王有服恪謹天命兹猶不常寧不常厥邑于今五邦今不承于古罔知天之斷命矧曰其克從先王之烈服事也先王有事恪謹天命不敢違越先王猶不敢常安不常其邑於今五遷厥邦矣今不承先王而遷且不知上天之斷絶我命况謂其能從先王之大烈乎詳此言則先王遷徙亦必有稽卜之事仲丁河亶甲篇逸不可攷矣五邦漢孔氏謂湯遷亳仲丁遷囂河亶甲居相祖乙居耿并盤庚遷殷鳥五邦然以下文今不承於古文勢攷之則盤庚之前當自有五遷史記言祖乙遷邢或祖乙两遷也音釋經恪克各反斷都管反傳亶多旱反囂先刀反相去聲若顛木之有由蘖天其永我命于兹新邑紹復先王之大業底綏四方顛仆也由古文作甹木生條也顛木譬耿由蘖譬殷也言今自耿遷殷若已仆之木而復生也天其將永我國家之命於殷以繼復先王之大業而致安四方乎薛氏曰不遷故罔知天之短命則遷乃天欲永我命也不遷故不克從先王之烈則遷乃紹復先王之業也陳氏大猷曰京師為諸夏本國都定則四方安矣承天命復祖業綏四方三者圖遷之本意故史述於篇首音釋經蘖牙葛反又魚列反字本作又作枿傳甹説文引書云若顛木之有甹枿字從丂象枝條之形謂己倒之木更生孫枝也而復扶又反盤庚斆于民由乃在位以常舊服正法度曰無或敢伏小人之攸箴王命衆悉至于庭斆教服事箴規也耿地潟鹵墊隘而有沃饒之利故小民苦於蕩析離居而巨室則總於貨寳惟不利於小民而利於巨室故巨室不恱而胥動浮言小民眩於利害亦相與咨怨間有能審利害之實而欲遷者則又往往為在位者之所排擊阻難不能自達於上盤庚知其然故其教民必自在位始而其所以教在位者亦非作為一切之法以整齊之惟舉先王舊常遷都之事以正其法度而已然所以正法度者亦非有他焉惟曰彼在位之臣無或敢伏小人之所箴規焉耳葢小民患潟鹵墊隘有欲遷而以言箴規其上者汝毋得遏絶而使不得自達也衆者臣民咸在也史氏將述下文盤庚之訓語故先𤼵此陳氏大猷曰法度如朝市室廬之營建道路頓宿之部分去舊即新之區畫之類遵故事則人情不駭達箴言則人情不壅此遷都之大綱也音釋經斆胡教反傳潟鹵上思積反下郎古反鹹地也間去聲難如字又去聲切干結反漢平帝紀註一切者權時之事如以刀切物茍取齊整不顧長短縱横也又七計反王若曰格汝衆予告汝訓汝猷黜乃心無傲從康若曰者非盡當時之言大意若此也汝猷黜乃心者謀去汝之私心也無與毋同毋得傲上之命從己之安葢傲上則不肯遷從康則不能遷二者所當黜之私心也此雖盤庚對衆之辭實為羣臣而𤼵以斆民由在位故也陳氏經曰傲上者違王命而不肯從從康者懐茍安而無逺慮羣臣所以不肯遷病根在此二者故直指其病戒之音釋傳去上聲為去聲古我先王亦惟圖任舊人共政王播告之修不匿厥指王用丕欽罔有逸言民用丕變今汝聒聒起信險膚予弗知乃所訟逸過也盤庚言先王亦惟謀任舊人共政王播告之修則奉承于内而能不隠匿其指意故王用大敬之宣化于外又無過言以惑衆聽故民用大變今爾在内則伏小人之攸箴在外則不和吉言于百姓譊譊多言凡起信於民者皆險陂膚淺之説我不曉汝所言果何謂也詳此所謂舊人者世臣舊家之人非謂老成人也蓋沮遷都者皆世臣舊家之人下文人惟求舊一章可見音釋經任如鴆反傳譊尼交反陂彼義反與詖通沮在吕反非予自荒兹徳惟汝含徳不惕予一人予若觀火予亦拙謀作乃逸荒廢也逸過失也盤庚言非我輕易遷徙自荒廢此徳惟汝不宣布徳意不畏懼於我我視汝情明若觀火我亦拙謀不能制命而成汝過失也若網在綱有條而不紊若農服田力穡乃亦有秋紊亂也綱舉則目張喻下從上小從大申前無傲之戒勤於田畝則有秋成之望喻今雖遷徙勞苦而有永建乃家之利申言從康之戒音釋經紊音問汝克黜乃心施實徳于民至于婚友丕乃敢大言汝有積徳蘇氏曰商之世家大族造言以害遷者欲以茍悦小民為德也故告之曰是何德之有汝曷不去汝私心施實徳于民與汝婚姻僚友乎勞而有功此實德也汝能勞而有功則汝乃敢大言曰我有積德曰積德云者亦指世家大族而言申言汝猷黜乃心之戒音釋傳去上聲乃不畏戎毒于逺邇惰農自安不昬作勞不服田畆越其罔有黍稷戎大昬强也汝不畏沈溺大害於逺近而憚勞不遷如怠惰之農不强力為勞苦之事不事田畝安有黍稷之可望乎此章再以農喻申言從康之害林氏曰此篇文勢大扺反覆辯論皆相顧成文既曰若農服田至有秋又曰惰農自安至罔有黍稷既曰予若觀火又曰若火之燎于原文雖渙散而意則相屬以是知盤庚之言雖佶屈聱牙不可遽曉然反覆求之於人情甚近也音釋經昬音敏傳强平聲下同汝不和吉言于百姓惟汝自生毒乃敗禍姦宄以自災于厥身乃既先惡于民乃奉其恫汝悔身何及相時憸民猶胥顧于箴言其發有逸口矧予制乃短長之命汝曷弗告朕而胥動以浮言恐沈于衆若火之燎于原不可嚮邇其猶可撲滅則惟汝衆自作弗靖非予有咎吉好也先惡為惡之先也奉承恫痛相視也憸民小民也逸口過言也逸口尚可畏况我制爾生殺之命可不畏乎恐謂恐動之以禍患沈謂沈䧟之於罪惡不可嚮邇其猶可撲滅者言其勢熖雖盛而殄滅之不難也靖安咎過也則惟爾衆自為不安非我有過也此章反覆辯論申言傲上之害陳氏大猷曰恫痛不急去之乃奉而養之猶安其危利其災也既先惡於始又䕶疾於今後雖悔之何及矣音釋經奉如字孔傳云奉持故陸音孚勇反恫音通陸又勑動反相去聲憸思亷反燎盧皎力照二反嚮許亮反古但作鄉今通作向後篇並同撲普卜反傳復音腹遲任有言曰人惟求舊器非求舊惟新遲任古之賢人蘇氏曰人舊則習器舊則敝當常使舊人用新器也今按盤庚所引其意在人惟求舊一句而所謂求舊者非謂老人但謂求人於世臣舊家云爾詳下文意可見若以舊人為老人又何侮老成人之有音釋經任如林反古我先王暨乃祖乃父胥及逸勤予敢動用非罰世選爾勞予不掩爾善兹予大享于先王爾祖其從與享之作福作災予亦不敢動用非徳胥相也敢不敢也非罰非所當罰也世非一世也勞勞於王家也掩蔽也言先王及乃祖乃父相與同其勞逸我豈敢動用非罰以加汝乎世簡爾勞不蔽爾善兹我大享于先王爾祖亦以功而配食於廟先王與爾祖父臨之在上質之在旁作福作災皆簡在先王與爾祖父之心我亦豈敢動用非徳以加汝乎陳氏櫟曰此以世臣與國同休戚感動之乃申圖任舊人之意謂汝從我遷我固不敢用非罰加汝執迷不遷亦不敢用非徳福汝又承上撲滅之言以起意而以威恐之以賞勸之也音釋經選須縜須兖二反與去聲予告汝于難若射之有志汝無侮老成人無弱孤有㓜各長于厥居勉出乃力聴予一人之作猷難言謀遷徙之難也蓋遷都固非易事而又當時臣民傲上從康不肯遷徙然我志決遷若射者之必於中有不容但己者弱少之也意當時老成孤㓜皆有言當遷者故戒其老成者不可侮孤㓜者不可少之也爾臣各謀長逺其居勉出汝力以聴我一人遷徙之謀也音釋經射食亦反長如字傳中去聲少失照反無有逺邇用罪伐厥死用徳彰厥善邦之臧惟汝衆邦之不臧惟予一人有佚罰用罪猶言為惡用徳猶言為善也伐猶誅也言無有逺近親䟽凡伐死彰善惟視汝為惡為善如何爾邦之善惟汝衆用徳之故邦之不善惟我一人失罰其所當罰也凡爾衆其惟致告自今至于後日各恭爾事齊乃位度乃口罰及爾身弗可悔致告者使各相告戒也自今以往各敬汝事整齊汝位法度汝言不然罰及汝身不可悔也林氏曰使驅以刑而迫之遷誰敢違之今其言乃若有所甚畏者蓋得天下有道得其民也得其民者得其心也得其心在所欲與之聚耳今日之遷惟欲聚民之所欲而已茍以勢驅而失人心雖能强之遷而民心以離矣故寧為優游不忍之詞開諭其心使知吾之本意既不失民之心亦不害吾之遷此盤庚所以為仁也盤庚中盤庚作惟涉河以民遷乃話民之弗率誕告用亶其有衆咸造勿䙝在王庭盤庚乃登進厥民作起而將遷之辭殷在河南故渉河誕大亶誠也咸造皆至也勿䙝戒其毋得䙝慢也此史氏之言蘇氏曰民之弗率不以政令齊之而以話言曉之盤庚之仁也吕氏曰王庭乃道路行宫如周禮掌次是也班次臣在前民在後故升進民於前而告之音釋經亶當旱反造七到反䙝私列反曰明聴朕言無荒失朕命荒廢也嗚呼古我前后罔不惟民之承保后胥慼鮮以不浮于天時承敬也蘇氏曰古者謂過為浮浮之言勝也后既無不惟民之敬故民亦保后相與憂其憂雖有天時之災鮮不以人力勝之也林氏曰憂民之憂者民亦憂其憂罔不惟民之承憂民之憂也保后胥慼民亦憂其憂也音釋經鮮上聲殷降大虐先王不懐厥攸作視民利用遷汝曷弗念我古后之聞承汝俾汝惟喜康其非汝有咎比于罰先王以天降大虐不敢安居其所興作視民利當遷而已爾民何不念我以所聞先王之事凡我所以敬汝使汝者惟喜與汝同安爾非為汝有罪比于罰而謫遷汝也音釋經共如字比毗至反傳為去聲予若籲懐兹新邑亦惟汝故以丕從厥志我所以招呼懐來于此新邑者亦惟以爾民蕩析離居之故欲承汝俾汝康共以大從爾志也或曰􅌉庚遷都民咨胥怨而此以為丕從厥志何也蘇氏曰古之所謂從衆者非從其口之所不樂而從其心之所不言而同然者夫趨利而避害捨危而就安民心同然也殷亳之遷實斯民所利特其一時為浮言摇動怨咨不樂使其即安危利害之實而反求其心則固其所大欲者矣音釋傳呼去聲樂音洛下同夫音扶舎音捨為去聲今予將試以汝遷安定厥邦汝不憂朕心之攸困乃咸大不宣乃心欽念以忱動予一人爾惟自鞠自苦若乘舟汝弗濟臭厥載爾忱不屬惟胥以沈不其或稽自怒曷瘳上文言先生惟民之承而民亦保后胥慼今我亦惟汝故安定厥邦而汝乃不憂我心之所困乃皆不宣布腹心欽念以誠感動於我爾徒為此紛紛自取窮苦譬乘舟不以時濟必敗壞其所資今汝從上之誠間㫁不屬安能有濟惟相與以及沈溺而已詩曰其何能淑載胥及溺正此意也利害若此爾民而罔或稽察焉是雖怨疾忿怒何損於困苦乎三山陳氏曰朕心之所困在於欲遷而民不從也鞠窮也我憂汝民之憂汝乃不憂我心之憂乃皆大不宣布其心不欽敬其念以至誠感動我一人茍安而不肯遷是爾自窮自苦耳音釋經忱時壬反下同乘平聲濟子計反載作代反又昨代反屬音燭瘳丑鳩反傳間去聲㫁徒玩反汝不謀長以思乃災汝誕勸憂今其有今罔後汝何生在上汝不為長乆之謀以思其不遷之災是汝大以憂而自勸也孟子曰安其危而利其災樂其所以亡勸憂之謂也有今猶言有今日也罔後猶言無後日也上天也今其有今罔後是天㫁棄汝命汝有何生理於天乎下文言迓續乃命于天蓋相首尾之辭音釋傳樂音洛㫁都管反今予命汝一無起穢以自臭恐人倚乃身迂乃心爾民當一心以聴上無起穢惡以自臭敗恐浮言之人倚汝之身迂汝之心使汝邪辟而無中正之見也陳氏大猷曰民已渉河復不肯遷是二而不一也今予命汝一意決往不可疑二起穢惡以自臭敗應上文臭厥載而言使速濟也予恐人蠱惑汝偏倚汝之身使不正迂曲汝之心使不直身心顚倒利害昏迷䘮亡無日音釋經迂雲俱反音與于同廣韻又音迓予迓續乃命于天予豈汝威用奉畜汝衆我之所以遷都者正以迎續汝命于天予豈以威脅汝哉用以奉養汝衆而已吕氏曰舊都圯壊天將㫁命今我因水患未甚而遷是迎迓接續汝之命於天也予豈以遷徙之事威虐汝乎用以承汝畜養汝耳音釋經畜許六反傳脅虚業反予念我先神后之勞爾先予丕克羞爾用懐爾然神后先王也羞養也即上文畜養之意言我思念我先神后之勞爾先人我大克羞養爾者用懐念爾故也失于政陳于兹髙后丕乃崇降罪疾曰曷虐朕民陳乆崇大也耿圯而不遷以病我民是失政而乆于此也髙后湯也湯必大降罪疾于我曰何為而虐害我民蓋人君不能為民圖安是亦虐之也音釋傳能為去聲汝萬民乃不生生暨予一人猷同心先后丕降與汝罪疾曰曷不暨朕㓜孫有比故有爽徳自上其罰汝汝罔能迪樂生興事則其生也厚是謂生生先后泛言商之先王㓜孫􅌉庚自稱之辭比同事也爽失也言汝民不能樂生興事與我同心以遷我先后大降罪疾於汝曰汝何不與朕㓜小之孫同遷乎故汝有失徳自上其罰汝汝無道以自免也音釋經比毗至反傳樂音洛古我先后既勞乃祖乃父汝共作我畜民汝有戕則在乃心我先后綏乃祖乃父乃祖乃父乃斷棄汝不救乃死既勞乃祖乃父者申言勞爾先也汝共作我畜民者汝皆為我所畜之民也戕害也綏懐來之意謂汝有戕害在汝之心我先后固已知之懐來汝祖汝父汝祖汝父亦㫁棄汝不救汝死也音釋經畜許六反戕慈良反㫁都管反兹予有亂政同位具乃貝玉乃祖乃父丕乃告我髙后曰作丕刑于朕孫迪髙后丕乃崇降弗祥亂治也具多取而兼有之謂言若我治政之臣所與共天位者不以生民為念而務富貝玉者其祖父亦告我成湯作丕刑于其子孫啓成湯丕乃崇降弗祥而不赦也此章先儒皆以為責臣之辭然祥其文勢曰兹予有亂政同位則亦對民庶責臣之辭非直為羣臣言也按上四章言君有罪民有罪臣有罪我髙后與爾民臣祖父一以義㫁之無所赦也王氏曰先王設教因俗之善而導之反俗之惡而禁之方􅌉庚時商俗衰士大夫棄義即利故􅌉庚以具貝玉為戒此反其俗之惡而禁之者也自成周以上莫不事死如事生事亡如事存故其俗皆嚴鬼神以經考之商俗為甚此因故􅌉庚特稱先后與臣民之祖父崇降罪疾為告其俗之善而導之者也陳氏櫟曰神后言神靈在天髙后言功徳崇髙與先后皆指先王之遷都者言之音釋傳治平聲直為去聲㫁都玩反嗚呼今予告汝不易永敬大恤無胥絶逺汝分猷念以相從各設中于乃心告汝不易即上篇告汝于難之意大恤大憂也今我告汝以遷都之難汝當永敬我之所大憂念者君民一心然後可以有濟茍相絶逺而誠不屬則殆矣分猷者分君之所圖而共圖之分念者分君之所念而共念之相從相與也中者極至之理各以極至之理存于心則知遷徙之議為不可易而不為浮言横議之所動摇也陳氏櫟曰告汝者一定不易矣永敬我所大憂者汝當以君之心為心也中者人心同然之理何待於設正縁羣臣狥於私情之一偏則中之理亡矣汝不當偏為己計當分汝所謀所念以從上各設中理於心則明見利害自有不偏之凖在胸中不至於偏私矣不設中於心則人將倚汝身迂汝心也音釋經易以豉反逺去聲又如字傳屬音燭可易夷益反横户孟反乃有不吉不迪顛越不恭暫遇姦宄我乃劓殄滅之無遺育無俾易種于兹新邑乃有不善不道之人顛隕踰越不恭上命者及暫時所遇為姦為宄刧掠行道者我小則加以劓大則殄滅之無有遺育毋使移其種于此新邑也遷徙道路間闗恐姦人乘隙生變故嚴明號令以告勑之音釋經無俾無與毋通易夷益反種之勇反往哉生生今予將試以汝遷永建乃家往哉往新邑也方遷徙之時人懐舊土之念而未見新居之樂故再以生生勉之振起其怠惰而作其趨事也試用也今我將用汝遷永立乃家為子孫無窮之業也陳氏櫟曰生生生養不窮之道也末二句應前今予將試以汝遷安定厥邦前以邦言此以乃家言互文見意民惟邦本本固邦寧必民家永建而後邦國安定矣音釋傳樂音洛盤庚下盤庚既遷奠厥攸居乃正厥位綏爰有衆盤庚既遷新邑定其所居正君臣上下之位慰勞臣民遷徙之勞以安有衆之情也此史氏之言音釋傳慰勞去聲曰無戲怠懋建大命曰盤庚之言也大命非常之命也遷國之初臣民上下正當勤勞盡瘁趨事赴功以為國家無窮之計故盤庚以無戲怠戒之以建大命勉之音釋經無與毋通今予其敷心腹腎腸歴告爾百姓于朕志罔罪爾衆爾無共怒協比䜛言予一人厯盡也百姓畿内民庶百官族姓亦在其中陳氏大猷曰敷心腹腎腸謂中懐無一不布露也厯猶盡也協合也比猶連也百姓通臣民而言前日臣民不肯遷故盤庚不得已以刑罰之説儆之事定之後臣民必有以舊事而自疑得罪者故盤庚謂我布露心腹盡告爾以我志如下文所云是也今汝既從我以遷我必不罪爾衆爾無懷疑共怒合比䜛言以謗議我音釋經腎是刃反比毗至反古我先王將多于前功適于山用降我凶徳嘉績于朕邦古我先王湯也適于山往于亳也契始居亳其後屢遷成湯欲多於前人之功故復往居亳按立政三亳鄭氏曰東成皋南轘轅西降谷以亳依山故曰適于山也降下也依山地髙水下而無河圯之患故曰用下我凶徳嘉績美功也按成皋漢志河南郡成皋縣即虎牢也轘轅在河南緱氏縣東南阪十二曲道將去復還故曰轘轅降谷未詳當亦在河南音釋傳契私利反復扶又反按此三亳與立政篇傳不同亦孔䟽所引鄭註但於史𫝊絶無考據蔡氏以其地皆岩險故引以釋適于山之語耳今我民用蕩析離居罔有定極爾謂朕曷震動萬民以遷今耿為河水圯壊沈溺墊隘民用蕩析離居無有定止將䧟於凶徳而莫之救爾謂我何故震動萬民以遷也肆上帝將復我髙祖之徳亂越我家朕及篤敬恭承民命用永地于新邑乃上天將復我成湯之徳而治及我國家我與一二篤敬之臣敬承民命用長居于此新邑也音釋傳治平聲肆予冲人非廢厥謀弔由靈各非敢違卜用宏兹賁冲童弔至由用靈善也宏賁皆大也言我非廢爾衆謀乃至用爾衆謀之善者指當時臣民有審利害之實以為當遷者言也爾衆亦非敢固違我卜亦惟欲宏大此大業爾言爾衆亦非有他意也蓋盤庚於既遷之後申彼此之情釋疑懼之意明吾前日之用謀略彼既往之傲惰委曲忠厚之意藹然於言辭之表大事以定大業以興成湯之澤於是而益永盤庚其賢矣哉陳氏櫟曰多于前功以下朱子本疑之弔由靈宏兹賁等語尤難曉姑存舊説而已音釋經冲侍忠反音與蟲同按字書當從水旁今書經皆從冫旁蓋衞包之誤耳弔音的賁符分反嗚呼邦伯師長百執事之人尚皆隠哉隠痛也盤庚復歎息言爾諸侯公卿百執事之人庶幾皆有所隠痛於心哉音釋經長上聲傳復扶又反予其懋簡相爾念敬我衆相爾雅曰導也我懋勉簡擇導汝以念敬我之民衆也音釋經相去聲朕不肩好貨敢恭生生鞠人謀人之保居敘欽肩任敢勇也鞠人謀人未詳或曰鞠養也我不任好賄之人惟勇於敬民以其生生為念使鞠人謀人之保居者吾則敘而用之欽而禮之也陳氏大猷曰新遷之民生理未復尤當視之如傷愛護而封殖之故總告之曰爾庶幾皆懷惻隠之心我其懋汝簡汝相汝汝當念敬我衆念謂念之而不忘敬謂敬之而不忽也王氏曰導其耕桑薄其税歛使老㓜不失其養鞠人之事也聨其比閭合其族黨相友相助謀人保居之事也既養之又安之則斯民之生生得矣音釋經好去聲傳任如鴆反陸音而林反今我既羞告爾于朕志若否罔有弗欽羞進也若者如我之意即敢恭生生之謂否者非我之意即不肩好貨之謂二者爾當深念無有不敬我所言也音釋經否俯乆反無總于貨寳生生自庸無毋同總聚也庸民功也此則直戒其所不可為勉其所當為也式敷民徳永肩一心式敬也敬布為民之徳永任一心欲其乆而不替也盤庚篇終戒勉之意一節嚴於一節而終以無窮期之盤庚其賢矣哉蘇氏曰民不悦而猶為之先王未之有也祖乙圯于耿盤庚不得不遷然使先王處之則動民而民不懼勞民而民不怨盤庚徳之衰也其所以信於民者未至故紛紛如此然民怨誹逆命而盤庚終不怒引咎自責益開衆言反復告諭以口舌代斧鉞忠厚之至此殷之所以不亡而復興也後之君子厲民以自用者皆以盤庚藉口予不可以不論陳氏櫟曰此篇始曰厯告百姓于朕志終曰羞告爾于朕志始告民以朕志者以釋其疑懼之情也終告臣以朕志者欲其審好惡之辨也前日羣臣唱浮言以惑民者傲上從康其病証也具乃貝玉其病根也今雖已遷而病証猶未退根猶未除故始曰無戯怠以革傲上從康之病証終曰不肩好貨無總貨寳使除具乃貝玉之病根然後上能敬君命下能仁民生而永建國家無窮之基矣音釋傳布為去聲反復音腹而復扶又反説命上説命記髙宗命傅説之言命之曰以下是也猶蔡仲之命微子之命後世命官制詞其原蓋出於此上篇記得説命相之辭中篇記説為相進戒之辭下篇記說論學之辭總謂之命者髙宗命説實三篇之網領故總稱之今文無古文有史記髙宗盤庚弟小乙之子名武丁音釋經説音悦三篇内並同陸云本又作兑傳相去聲下同王宅憂亮隂三祀既免喪其惟弗言羣臣咸諌于王曰嗚呼知之曰明哲明哲實作則天子惟君萬邦百官承式王言惟作命不言臣下罔攸禀令亮一作諒隂古作闇按喪服四制髙宗諒隂三年鄭氏注云諒古作梁楣謂之梁闇讀如鶉䳺之䳺闇謂廬也即倚廬之廬儀禮剪屏柱楣鄭氏謂柱楣所謂梁闇是也宅憂亮隂言宅憂於梁闇也先儒以亮隂為信黙不言則於諒隂三年不言為語􅃨而不可解矣君薨百官總已聴於冢宰居憂亮隂不言禮之常也髙宗喪父小乙惟既免喪而猶弗言羣臣以其過於禮也故咸諫之歎息言有先知之徳者謂之明哲明哲實為法於天下今天子君臨萬邦百官皆奉承法令王言則為命不言則臣下無所稟令矣音釋經亮龍張反音與梁同隂烏含反音與菴同按菴字與䳺字同音但古無菴字後漢史方有之故鄭氏以䳺為音今易之以便時俗喪平聲令去聲傳楣音眉鶉殊倫反䳺烏含反音與菴同倚廬儀禮疏云倚廬孝子所居在門外東壁倚木為廬也剪屏必郢反儀禮無音柱楣儀禮疏云剪屏者士喪三虞之後改舊西鄉開户剪去户傍兩廂屏之餘草柱楣者前梁謂之楣楣下兩頭豎柱施梁乃夾户傍之屏也朱子云柱字當從手不從木音冡與反蓋始者户北向用草為屏不剪其餘草至是改而西向乃剪其餘草始者無柱與楣簷著於地至是乃施楣及短柱以拄其楣架起其簷令稍髙而下可作户也複音腹王庸作書以誥曰以台正于四方台恐徳弗類兹故弗言恭黙思道夢帝賚予良弼其代予言庸用也髙宗用作書告諭羣臣以不言之意言以我表正四方任大責重恐徳不類于前人故不敢輕易發言而恭敬淵黙以思治道夢帝與我賢輔其將代我言矣蓋髙宗恭黙思道之心純一不二與天無間故夢寢之間帝賚良弼其念慮所孚精神所格非偶然而得者也音釋傳無間去聲乃審厥象俾以形旁求于天下說築傅巖之野惟肖審詳也詳所夢之人繪其形象旁求于天下旁求者求之非一方也築居也今言所居猶謂之卜築傅巖在虞虢之問肖似也與所夢之形相似孔氏曰傅氏之巖有澗水壊道嘗使胥靡築之説賢而隠代築以供食孟子亦云傅説舉于版築之間以此音釋傳繪音會畫也虢郎獲反按虢有三此與虞相近則北虢也在河東郡太陽縣爰立作相王置諸其左右於是立以為相按史記髙宗得説與之語果聖人乃舉以為相書不言省文也未接語而遽命相亦無此理置諸左右蓋以冢宰兼師保也荀卿曰學莫便乎近其人置諸左右近其人以學也史臣將記髙宗命説之辭先敘事始如此音釋經相去聲左右上臧可反下云九反傳荀卿名況著荀子近巨靳反先先見反命之曰朝夕納誨以輔台徳此下命説之辭朝夕納誨者無時不進善言也孟子曰人不足與適也政不足與間也惟大人為能格君心之非髙宗既相説處之以師傅之職而又命之朝夕納誨以輔台徳可謂知所本矣吕氏曰髙宗見道明故知頃刻不可無賢人之言音釋傳適音謫間去聲相去聲若金用汝作礪若濟巨川用汝作舟楫若嵗大旱用汝作霖雨三日雨為霖髙宗託物以喻望説納誨之切三語雖若一意然一節深一節也啓乃心沃朕心啓開也沃灌溉也啓乃心者開其心而無隠沃朕心者溉我心而厭飫也陳氏大猷曰相業莫要於輔徳輔徳莫切於格心格心之道非可外求惟以心格心啓開而發之也沃灌而入之也音釋傳溉居代反厭於豔於鹽二反若藥弗􅉂眩厥疾弗瘳若跣弗視地厥足用傷方言曰飲藥而毒海岱之間謂之􅉂眩瘳愈也弗瞑眩喻臣之言不苦口也弗視地喻我之行無所見也仁山金氏曰恭者敬身以處黙者不言而思思道者懋此道體為何如也此髙宗之舊學孔子曰思而不學則殆髙宗思之之功固至然磨礪相濟􅇽養之無助則心孤而無益若金蓋思而有所未快自以為鈍而資其礪也若濟巨川蓋思而未能遽通自覺其險而資其濟也若嵗大旱蓋思雖有得然心枯而無滋養之助自覺其竭而思其化也故又總之以啓乃心沃朕心言之若藥之喻謂言不直則已之宿疾不除若跣之喻謂知不明則行必有所不安皆用工之語非泛言也音釋經􅉂眠見反眩熒絹反跣蘇典反傳方言書名漢揚雄字子雲作惟暨乃僚罔不同心以匡乃辟俾率先王迪我髙后以康兆民匡正率循也先王商先哲王也説既作相總百官則卿士而下皆其僚屬髙宗欲傅説暨其僚屬同心正救使循先王之道蹈成湯之迹以安天下之民也音釋經辟必益反嗚呼欽予時命其惟有終敬我是命其思有終也是命即上文所命者説復于王曰惟木從繩則正后從諫則聖后克聖臣不命其承疇敢不祗若王之休命荅欽子時命之語木從繩喻后從諫明諫之决不可不受也然髙宗當求受言於己不必責進言於臣君果從諫臣雖不命猶且承之況命之如此誰敢不敞順其美命乎仁山金氏曰髙宗之命辭詳而説之對反略其要在從諫一語蓋髙宗舊學未成視羣臣又非甘盤之比故當反求諸己而思之其病在求於獨而畧於人故傅説且以從諫藥其病此病既除言則必行而已㝎言可以朝暮入不必遽數言之也說命中惟説命總百官説受命總百官冢宰之職也乃進于王曰嗚呼明王奉若天道建邦設都樹后王君公承以大夫師長不惟逸豫惟以亂民后王天子也君公諸侯也治亂曰亂明王奉順天道建邦設都立天子諸侯承以大夫師長制為君臣上下之禮以尊臨卑以下奉上非為一人逸豫之計而已也惟欲以治民焉耳陳氏櫟曰説初見髙宗上篇所言只及從諫至此乃詳及為君立政之道自此以下至事神則難乃其進諫之綱領條目也音釋經長上聲傳治平聲下同非為去聲惟天聰明惟聖時憲惟臣欽若惟民從乂天之聰明無所不聞無所不見無他公而已矣人君法天之聰明一出於公則臣敬順而民亦從治矣仁山金氏曰此篇以憲天聰明為主其下厯舉憲天之目惟口起羞惟甲胄起戎惟衣裳在笥惟干戈省厥躬王惟戒兹允兹克明乃罔不休言語所以文身也輕出則有起羞之患甲冑所以衛身也輕動則有起戎之憂二者所以為己當慮其患於人也衣裳所以命有徳必謹於在笥者戒其有所輕予干戈所以討有罪必嚴於省躬者戒其有所輕動二者所以加人當審其用於己也王惟戒此四者信此而能明焉則政治無不休美矣仁山金氏曰此四者政令刑賞之大者甲胄阻兵自衛也干戈以兵伐人也重言之者髙宗天資英毅𫝊説戒其輕于用武也音釋經胄直又反兠鍪也按韻書字下當從日胄𦙍之胄乃從肉今多相混也笥相吏反省息井反傳為去聲予音與惟治亂在庻官官不及私昵惟其能爵罔及惡徳惟其賢庶官治亂之原也庻官得其人則治不得其人則亂王制曰論定而後官之任官而後爵之六卿百執事所謂官也公卿大夫士所謂爵也官以任事故曰能爵以命徳故曰賢惟賢惟能所以治也私昵惡徳所以亂也吴氏曰惡徳猶凶徳也人君當用吉士凶徳之人雖有過人之才爵亦不可及也按古者公侯伯子男爵之於侯國公卿大夫士爵之於朝廷此言庻官則公卿大夫士也音釋經昵尼爾反慮善以動動惟厥時善當乎理也時時措之宜也慮固欲其當乎理然動非其時猶無益也聖人酬酢斯世亦其時而已音釋傳當去聲下同有其善喪厥善矜其能喪厥功自有其善則已不加勉而徳虧矣自矜其能則人不効力而功隳矣音釋經喪去聲下同惟事事乃其有備有備無患惟事其事乃其有備有備故無患也張氏曰修車馬備器械事乎兵事則兵有其備故外侮不能為之憂簡稼器修稼政事乎農事則農有其備故能水旱不為之害所謂事事有備無患者如此無啓寵納侮無恥過作非無聞寵幸而納人之侮無恥過誤而遂己之非過誤出於偶然作非出於有意音釋經無毋通下同惟厥攸居政事惟醇居止而安之義安於義理之所止也義理出於勉强則猶二也義理安於自然則一矣一故政事醇而不雜也音釋傳强上聲黷于祭祀時謂弗欽禮煩則亂事神則難祭不欲黷黷則不敬禮不欲煩煩則擾亂皆非所以交鬼神之道也商俗尚鬼髙宗或未能脱於流俗事神之禮必有過焉傅説蓋因其失而正之也新安王氏曰祭必有節不可疏亦不可數疏則怠怠則于禮不及數則黷黷則于禮大過其非敬一也黷之為非敬者盖禮失之煩則亂而不誠神必不享故事神則難也陳氏大猷曰已上皆憲天聰明之事事事物物皆有天然至當之理惟聰明者能盡之茍加一毫損益即是私意非天之聰明也音釋經黷徒谷反王曰旨哉説乃言惟服乃不良于言予罔聞于行旨美也古人於飲食之美者必以旨言之盖有味其言也服行也髙宗贊美説之所言謂可服行使汝不善於言則我無所聞而行之也蘇氏曰説之言譬如藥石雖散而不一然一言一藥皆足以治天下之公患所謂古之立言者音釋傳治平聲説拜稽首曰非知之艱行之惟艱王忱不艱允協于先王成徳惟説不言有厥咎髙宗方味説之所言而説以為得於耳者非難行於身者為難王忱信之亦不為難信可合成湯之成徳説於是而猶有所不言則有其罪矣上篇言后克聖臣不命其承所以廣其從諫之量而將告以為治之要也此篇言允協先王成徳惟説不言有厥咎所以責其躬行之實將進其為學之説也皆引而不發之意仁山金氏曰知而後行知為先髙宗之已得知易而行難行為重傅説之責難音釋傳量去聲之説如字説命下王曰來汝說台小子舊學于甘盤既乃遯于荒野入宅于河自河徂亳暨厥終罔顯甘盤臣名君奭言在武丁時則有若甘盤遯退也髙宗言我小子舊學于甘盤蘇氏曰甘盤遯去不知所終武丁無所卒業學者徒見書云髙宗時舊勞于外不知小乙使知艱難耳决非荒野之遯也真氏大學衍義仍用蘇説朱子語錄亦謂暨厥終罔顯只是尋甘盤不見觀下文爾交修予罔予棄葢恐傅說效甘盤而遯也仁山金氏曰甘盤髙宗初年相也其後復政逺引再三求之卒老采邑爾惟訓于朕志若作酒醴爾惟麴蘖若作和羮爾惟鹽梅爾交修予罔予棄予惟克邁乃訓心之所之謂之志邁行也范氏曰酒非麴蘖不成羮非鹽梅不和人君須有美質必得賢人輔導乃能成徳作酒者麴多則太苦蘖多則太甘麴蘖得中然後成酒作羮者鹽過則鹹梅過則酸鹽梅得中然後成羮臣之於君當以柔濟剛可濟否左右規正以成其徳故曰爾交修予爾無我棄我能行爾之言也孔氏曰交者非一之義陳氏經曰中篇説謂患髙宗之不能行不患臣之不能言此髙宗謂患説之不能言不患我之不能行音釋經醴音禮麴丘六反蘖魚列反和如字説曰王人求多聞時惟建事學于古訓乃有獲事不師古以克永世匪説攸聞求多聞者資之人學古訓者反之已古訓者古先聖王之訓載修身治天下之道二典三謨之類是也説稱王而告之曰人求多聞者是惟立事然必學古訓深識義理然後有得不師古訓而能長治久安者非説所聞甚言無此理也林氏曰傅説稱王而告之猶禹稱舜曰帝尤天之下文勢正同音釋傳身治平聲長治去聲惟學遜志務時敏厥修乃來允懐于兹道積于厥躬遜謙抑也務専力也時敏者無時而不敏也遜其志如有所不能敏於學如有所不乃虚以受人勤以勵己則其所修如泉始達源源乎其來矣兹此也篤信而深念乎此則道積於身不可以一二計矣夫修之來來之積其學之得於己者如此音釋傳夫音扶惟斆學半念終始典于學厥徳修罔覺斆教也言教人居學之半蓋道積厥躬者體之立斆學于人者用之行兼體用合内外而後聖學可全也始之自學學也終之教人亦學也一念終始常在於學無少間斷則徳之所修有不知其然而然者矣或曰受教亦曰教教於為學之道半之半須自得此説極為新巧但古人論學語皆平正的實此章句數非一不應中間一語獨爾險巧此蓋後世釋教機權而誤以論聖賢之學也音釋經斆胡教反傳間去聲㫁徒玩反數雙遇反應平聲監于先王成憲其永無愆憲法愆過也言徳雖造於罔覺而法必監于先王先王成法子孫之所當守者也孟子言遵先王之法而過者未之有也亦此意音釋經監音鑒傳造七到反惟説式克欽承旁招俊乂列于庶位式用也言髙宗之徳茍至於無愆則説用能敬承其意廣求俊乂列於衆職蓋進賢雖大臣之責然髙宗之徳未至則雖欲進賢有不可得者王曰嗚呼説四海之内咸仰朕徳時乃風風教也天下皆仰我徳是汝之教也股肱惟人良臣惟聖手足備而成人良臣輔而君聖髙宗初以舟楫霖雨為喻繼以麴蘖鹽梅為喻至此又以股肱惟人為喻其所造益深所望益切矣陳氏櫟曰髙宗潛黙之久一旦舉説相之風聲所動四海仰徳然非輔君成聖則無以慰人之仰徳説始告君以從諫則聖惟聖時憲是臣以聖期待其君今髙宗語説以良臣惟聖是君亦以聖自待矣音釋傳造七到反昔先正保衡作我先王乃曰予弗克俾厥后惟堯舜其心愧恥若撻于市一夫不獲則曰時予之辜佑我烈祖格于皇天爾尚明保予罔俾阿衡専美有商先正先世長官之臣保安也保衡猶阿衡作興起也撻于市恥之甚也不獲不得其所也髙宗舉伊尹之言謂其自任如此故能輔我成湯功格于皇天爾庶幾明以輔我無使伊尹専美於我商家也傅説以成湯望髙宗故曰協于先王成徳監于先王成憲髙宗以伊尹望傅説故曰罔俾阿衡専美有商音釋傳長上聲蔡𫝊此章從孔氏訓正為長君牙文侯篇釋先正為祖父按詩雲漢禮記緇衣亦皆訓長宜歸于一惟后非賢不乂惟賢非后不食其爾克紹乃辟于先王永綏民説拜稽首曰敢對揚天子之休命君非賢臣不與共治賢非其君不與共食言君臣相遇之難如此克者責望必能之辭敢者自信無慊之辭對者對以己揚者揚于衆休命上文髙宗所命也至是髙宗以成湯自期傅説以伊尹自任君臣相勉勵如此異時髙宗為商令王傅説為商賢佐果無愧於成湯伊尹也宜哉音釋經辟必益反傳慊苦簟反令去聲髙宗肜日仁山金氏曰此篇首稱髙宗肜日終言無豐于昵髙宗廟號也似謂髙宗之廟昵近廟也似是祖庚繹于髙宗之廟兼髙宗名臣不聞祖己乃訓于王似告㓜君書敘大誤惟史記謂此書作於祖庚之時為得之今文古文皆有音釋經肜音融肜祭髙宗而曰髙宗肜日者謂於髙宗之廟肜祭之日也如仲康命𦙍侯而曰𦙍侯命掌六師髙宗命傅説而曰惟説命總百官書中如此者多乃史氏立言之法也髙宗肜日越有雊雉肜祭明日又祭之名殷曰肜周曰繹雊鳴也於肜祭之日有雊雉之異音釋經雊居侯反傳繹音亦字書作襗祖己曰惟先格王正厥事豐於昵失禮之正故有雊雉之異祖己自言當格王之非心然後正其所失之事惟天監民以下格王之言王司敬民以下正事之言也乃訓于王曰惟天監下民典厥義降年有永有不永非天夭民民中絶命典主也義者理之當然行民而宜之之謂言天監視下其禍福予奪惟主義如何耳降年有永有不永義則永不義則不永非天夭折其民民自以非義而中絶其命也以是觀之祖庚之祀必有祈天請命之事如漢武帝五畤祀之類祖己言永年之道不在禱祠在於所行義與不義而已禱祠非永年之道也言民而不言君者不敢斥也音釋經監音鑒夭於兆反中如字陸又音去聲傳予音與五畤諸市反音與止同為壇以祭天言神靈所依止也史記及漢書註云雍五畤者秦宣公作宻畤祠青帝靈公作上畤祠黄帝下畤祠炎帝獻公作畦畤祠白帝至漢髙帝作北畤祠黒帝其後文帝武帝皆幸雍郊見五畤民有不若徳不聴罪天既孚命正厥徳乃曰其如台不若徳不順於徳不聴罪不服其罪謂不改過也孚命者以妖孽為符信而譴告之也言民不順徳不服罪天既以妖孽為符信而譴告之欲其恐懼修省以正徳民乃曰孽祥其如我何則天必誅絶之矣音釋傳妖於喬反字當作祅説文云衣服歌謡之怪也孽魚列反字當作􅖈禽獸蟲豸之怪也譴詰戰反省息井反下同嗚呼王司敬民罔非天𦙍典祀無豐于昵司主𦙍嗣也王之職主於敬民而已徼福於神非王之事况祖宗莫非天之嗣主祀其可獨豐於昵廟乎音釋經無與毋通昵尼質反西伯戡黎西伯武王也史記嘗載紂使膠鬲觀兵膠鬲問之曰西伯何為而來哉則武王亦繼文王為西伯矣仁山金氏曰西伯武王也武王襲爵以後未克商以前商人稱之曰周西伯也故胡五峰大紀吕成公陳少南薛季龍皆謂武王舊説文王失之矣又曰受朝歌今衞州黎今潞洲黎城然衛亦有黎陽則戡黎之師於受都已廹吴才老謂是武王伐紂時葢以祖伊辭氣為甚迫也然亦當在觀兵時浚儀王氏曰西伯既戡黎祖伊恐商都朝歌黎在上黨壺闗乃河朔險要之地朝歌之西境宻邇王畿黎亡則商震矣故武王渡孟津莫之或禦周以商墟封衛狄人迫逐黎侯衛為方伯連率不能救而式微旄丘之詩作唇亡齒寒衞終為狄所滅衞之亡猶商之亡也秦㧞上黨而韓趙危唐平澤潞而三鎮服形勢其可忽哉今文古文皆有音釋經戡音堪説文引書作或黎尚書大傳作耆史記作飢又作􅢿説文作􅧰集韻或作西伯既戡黎祖伊恐奔告于王下文無及戡黎之事史氏特指此篇首以見祖伊告王之因也祖姓伊名祖己後也奔告自其邑奔走來告紂也音釋傳見形甸反曰天子天既訖我殷命格人元龜罔敢知吉非先王不相我後人惟王滛戲用自絶祖伊將言天訖殷命故特呼天子以感動之訖絶也格人猶言至人也格人元龜皆能先知吉凶者言天既已絶我殷命格人元龜皆無敢知其吉者甚言凶禍之必至也非先王在天之靈不佑我後人我後人滛戲用自絶於天耳音釋經相去聲傳呼去聲故天棄我不有康食不虞天性不迪率典康安虞度也典常法也紂自絶於天故天棄殷不有康食饑饉荐臻也不虞天性民失常心也不迪率典廢壊常法也音釋傳度達各反饉渠吝反壊音怪今我民罔弗欲喪曰天曷不降威大命不摰今王其如台大命非常之命摰至也史記云大命胡不至民苦紂虐無不欲殷之亡曰天何不降威於殷而受大命者何不至乎今王其無如我何言紂不復能君長我也上章言天棄殷此章言民棄殷祖伊之言可謂痛切明著矣音釋經喪去聲摰音至傳復扶又反長上聲王曰嗚呼我生不有命在天紂歎息謂民雖欲亡我我之生獨不有命在天乎祖伊反曰嗚呼乃罪多參在上乃能責命于天紂既無改過之意祖伊退而言曰爾罪衆多參列在上乃能責其命於天耶吕氏曰責命於天惟與天同徳者方可音釋經參倉舍反殷之即喪指乃功不無戮于爾邦功事也言殷即喪亡矣指汝所為之事其能免戮於商邦乎蘇氏曰祖伊之諌盡言不諱漢唐中主所不能容者紂雖不改而終不怒祖伊得全則後世人主有不如紂者多矣愚讀是篇而知周徳之至也祖伊以西伯戡黎不利於殷故奔告於紂意必及西伯戡黎不利於殷之語而入以告后出以語人未甞有一毫及周者是知周家初無利天下之心其戡黎也義之所當伐也使紂遷善改過則周將終守臣節矣􅃝伊殷之賢臣也知周之興必不利于殷又知殷之亡初無與于周故因戡黎告紂反覆乎天命民情之可畏而畧無及周者文武公天下之心於是可見鄒季友按此篇祖伊之言危迫之甚必在周師既渡河之後若文王時必無殷之既喪不無戮于爾邦之語篇次不當在微子之前音釋經喪去聲傳以語去聲與去聲微子微國名子爵也微子名啓帝乙長子紂之庶母兄也微子痛殷之將亡謀於箕子比干史録其問答之語亦誥體也以篇首有微子二字因以名篇今文古文皆有音釋經微國名在東郡聊城今博州聊城縣有微子故城箕亦國名今陳州西華縣有箕城長上聲微子若曰父師少師殷其弗或亂正四方我祖底遂陳于上我用沈酗于酒用亂敗厥徳于下父師大師三公箕子也少師孤卿比干也弗或者不能或如此也亂治也言紂無道無望其能治正天下也底致陳列也我祖成湯致功陳列於上而子孫沈酗于酒敗亂其徳於下沈酗言我而不言紂者過則歸己猶不忍斥言之也仁山金氏曰首章喻紂之必亡音釋經酗吁句反敗北漢反傳治平聲殷罔不小大好草竊姦宄卿士師師非度凡有辜罪乃罔恒獲小民方興相為敵讐今殷其淪喪若渉大水其無津涯殷遂喪越至于今殷之人民無小無大皆好草竊姦宄上而卿士亦皆相師非法上下容隠凡有冐法之人無有得其罪者小民無所畏懼强􅇒弱衆暴寡方起讐怨爭闘侵奪綱紀蕩然淪喪之形茫無畔岸若渉大水無有津涯殷之喪亡乃至於今日乎微子上陳列祖下述喪亂哀憤怨痛切言有盡而意無窮數千載之下猶使人傷感悲後世人主觀此亦可深監矣仁山金氏曰次章言己之欲去音釋經好去聲恒胡登反喪去聲下同傳監音鑒曰父師少師我其發出狂吾家耄遜于荒今爾無指告予顛隮若之何其曰者微子更端之辭何其語辭言紂發出顛狂暴虐無道我家老成之人皆逃遁於荒野危亡之勢如此今爾無所指示告我以顛隕隮墮之事將若之何哉蓋微子憂危之甚特更端以問救亂之䇿言我而不言紂者亦上章我用沈酗之義仁山金氏曰欲處不可救欲逃恐遂亡情不能已又問二子當有救亡之䇿音釋經出尺類反隮牋四反陸子細反下同其如字鄭𤣥云語助也齊魯之間聲如姫與禮記何居同傳更平聲父師若曰王子天毒降災荒殷邦方興沈酗于酒此下箕子之答也王子微子也自紂言之則紂無道故天降災自天下言之則紂之無道亦天之數箕子歸之天者以見其忠厚敬君之意與小旻詩言旻天疾威敷于下土意同方興者言其方興而未艾也此荅微子沈酗于酒之語而有甚之之意下同音釋傳見形甸反艾生蓋反乃罔畏畏咈其耉長舊有位人乃罔畏畏者不畏其所當畏也孔子曰君子有三畏畏天命畏大人畏聖人之言咈逆也耉長老成之人也紂惟不畏其所當畏故老成舊有位者紂皆咈逆而棄逐之即武王所謂播棄黎老者此荅微子發狂耄遜之語以上文特發問端故此先荅之音釋經長上聲今殷民乃攘竊神祇之犧牷牲用以容將食無災色純曰犧體完曰牷牛羊豕曰牲犧牷牲祭祀天地之物禮之最重者猶為商民攘竊而去有司用相容隠將而食之且無災禍豈特草竊姦宄而已哉此荅微子草竊姦宄之語音釋經攘如羊反犧虚宜反牷音全降監殷民用乂讐歛召敵讐不怠罪合于一多瘠罔詔讐歛若仇敵掊歛之也不怠力行而不息也詔告也下視殷民凡上所用以治之者無非讐歛之事夫上以讐而歛下則下必為敵以讐上下之敵讐實上之讐歛以召之而紂方且召敵讐不怠君臣上下同惡相濟合而為一故民多饑殍而無所告也此荅微子小民相為敵讐之語音釋經監音鑒歛力驗反陸音力檢反傳掊音裒治平聲夫音扶殍婢表反商今其有災我興受其敗商其淪喪我罔為臣僕詔王子出迪我舊云刻子王子弗出我乃顛隮商今有其災我出當其禍敗商若淪喪我㫁無臣僕他人之理詔告也告微子以去為道蓋商祀不可無人微子去則可以存商祀也刻害也箕子舊以微子長且賢勸帝乙立之帝乙不從卒立紂紂必忌之是我前日所言適以害子子若不去則禍必不免我商家宗祀始隕墜而無所托矣箕子自言其義決不可去而微子之義決不可不去也此荅微子淪喪顛隮之語音釋經喪去聲傳㫁都玩反長上聲自靖人自獻于先王我不顧行遯上文既荅微子所言至此則告以彼此去就之義靖安也各安其義之所當盡以自達其志於先王使無愧於神明而已如我則不復顧行遯矣唐孔氏曰微子告二人而獨箕子荅者比干與箕子意同經省文也語録荅嚴時亨曰所解三仁事史記左傳互有不同但論語只言微子去之初無靣縛銜璧之説今乃舍孔子而從左氏史遷已自難信又不得已而曲為之説以為微子之去乃去紂而適封國則尤無所據矣仁山金氏曰自靖謂各行其分之所宜而即其心之所安也孔子所謂三仁是人各行其所安有以告於先王而無愧於神明可矣王子有可去之意蓋不可使受有殺兄之名而元子在外萬一有維持宗社之計若我則無可去之義故曰我不顧行遯是亦將以死救也詳此辭意則箕子比干同以死諫比干見殺箕子偶不見殺而囚耳説者遂以箕子有言而比干獨無言者去就之義難明而死節之義易見殊不知箕子豈有去意而比干之無荅亦以箕子意同故不復有異辭耳微子之去遯于荒野而已舊説抱祭器以歸周者殊失之書傳會選卷三
