body:
  text: 書傳會選卷六明劉三吾撰周官成王訓迪百官史録其言以周官名之亦訓體也今文無古文有按此篇與今周禮不同如三公三孤周禮皆不載或謂公孤兼官無正職故不載然三公論道經邦三孤二公𢎞化非職乎職任之大無踰此矣或又謂師氏即太師保氏即太保然以師保之尊而反屬司徒之職亦無是理也又此言六年五服一朝而周禮六服諸侯有一歲一見者二歲一見者三歲一見者亦與此不合是固可疑然周禮非聖人不能作也意周公方條治事之官而未及師保之職所謂未及者鄭重而未及言之也書未成而公亡其間法制有未施用故與此異而冬官亦缺要之周禮首末未備周公未成之書也惜哉讀書者參互而考之則周公經制可得而論矣音釋傳朝馳遙反見形甸反下同治平聲要平聲惟周王撫萬邦巡侯甸四征弗庭綏厥兆民六服羣辟罔不承德歸于宗周董正治官此書之本序也庭直也葛氏曰弗庭弗來庭者六服侯甸男采衛并畿內為六服也禹貢五服通畿內周制五服在王畿外也周禮又有九服侯甸男采衛蠻夷鎮藩與此不同宗周鎬京也董督也治官凡治事之官也言成王撫臨萬國巡狩侯甸四方征討不庭之國以安天下之民六服諸侯之君無不奉承周德成王歸於鎬京督正治事之官外攘之功舉而益嚴內治之修也唐孔氏曰周制無萬國惟伐淮夷非四征也大言之爾陳氏大猷曰自古外患既平內治遂弛者多矣晉武平吳唐莊宗克梁君臣燕逸遂不克終成王當六服既承周德即歸董正治官不敢恃外寧而忘內治也音釋經辟必益反治陸直去聲言主政治之官也從孔蔡傳則當音平聲此篇經傳治字尤多且多當作平聲今除篇中音去聲者其餘皆平聲不復皆音王曰若昔大猷制治于未亂保邦于未危若昔大道之世制治保邦于未亂未危之前即下文明王立政是也音釋經治去聲曰唐虞稽古建官惟百內有百揆四嶽外有州牧侯伯庶政惟和萬國咸寧夏商官倍亦克用乂明王立政不惟其官惟其人百揆無所不總者四嶽總其方嶽者州牧各總其州者侯伯次州牧而總諸侯者也百揆四嶽總治于內州牧侯伯總治于外內外相承體統不紊故庶政惟和而萬國咸安夏商之時世變事繁觀其會通制其繁簡官數加倍亦能用治明王立政不惟其官之多惟其得人而已音釋經倍薄亥反傳數雙遇反今豫小子祇勤于德夙夜不逮仰惟前代時若訓迪厥官逮及是時若順也成王祇勤于德早夜若其有所不及然蓋修德者任官之本也音釋經逮徒耐反又湯亥大計二反立太師太傅大保惟兹三公論道經邦燮理隂陽官不必備惟其人立始辭也三公非始于此立為周家制則始于此也賈誼曰保者保其身體傅者傅之德義師者道之教訓此所謂三公也隂陽以氣言道者隂陽之理恆而不變者也易曰一隂一陽之謂道是也陳氏大猷曰道者萬化之原萬事之本所以統理天人者也論道者講貫闡明此道以立天下之大本推以經邦使教化行政事舉民物咸若和氣薰陶三光全寒暑平四時序所以燮理隂陽而成調劑也音釋經燮素協反少師少傅少保曰三孤二公𢎞化寅亮天地弼豫一人孤特也三少雖三公之二而非其屬官故曰孤天地以形言化者天地之運用而無迹者也易曰範圍天地之化是也𢎞者張而大之寅亮者敬而明之也公論道孤𢎞化公燮理隂陽孤寅亮天地公論于前孤弼于後公孤之分如此音釋經少師照反冢宰掌邦治統百官均四海冢大宰治也天官卿治官之長是為冢宰內統百官外治四海蓋天子之相也百官異職管攝使歸于一是之謂統四海異宜調劑使得其平是之謂均音釋傳長上聲相去聲司徒掌邦教敷五典擾兆民擾馴也地官卿主國教化敷君臣父子夫婦長幼朋友五者之教以馴擾兆民之不順者而使之順也唐虞司徒之官固已職掌如此宗伯掌邦禮治神人和上下春官卿主邦禮治天神地祇人鬼之事和上下尊卑等列春官于四時之序為長故其官謂之宗伯成周合樂于禮官謂之和者蓋以樂而言之也金氏履祥曰宗伯不言司蓋以所掌者禮禮莫重于祭祭莫切于宗廟不敢言司尊宗廟且崇禮也音釋經長上聲舜典秩宗傳云宗祖廟也周禮亦謂之宗伯而此又以宗訓長和也司馬掌邦政統六師平邦國夏官卿主戎馬之事掌國征伐統御六軍平治邦國平謂強不得陵弱衆不得暴寡而人皆得其平也軍政莫急于馬故以司馬名官何莫非政獨戎政謂之政者用以征伐而正彼之不正王政之大者也司寇掌邦禁詰姦慝刑暴亂秋官卿主寇賊法禁羣行攻劫曰寇詰姦慝刑強暴作亂者掌刑不曰刑而曰禁者禁于未然也吕氏曰姦慝隱而難知故謂之詰推鞫窮詰而求其情也暴亂顯而易見直刑之而已陳氏經曰虞禮樂分為二官周合為一虞以士兼兵周分為二帝世詳于化而略于政王世詳于政而略于化世道升降之異也司空掌邦土居四民時地利冬官卿主國空土以居士農工商四民順天時以興地利按周禮冬官則記考工之事與此不同蓋本闕冬官漢儒以考工記當之也陳氏大猷曰為治莫先于教化故冢宰之後司徒次之教民莫先于禮樂故宗伯次之教之有不率則大者加兵小者加刑罰不得已也故司馬司寇次之暴亂去而後民得安居故司空終焉仁山金氏曰司空掌空土之官也分畫空土以待臣之受封士之受祿農之受田工之受肆賈之受㕓也凡土之未受者司空主之既授則屬之司徒司馬六卿分職各率其屬以倡九牧阜成兆民按周禮每卿六十屬也陳氏大猷曰周以六典治邦國自王朝至諸侯皆用六典以為治六卿分職各率其屬修舉六典于內以倡率九州之牧使九牧各率其州之諸侯遵王朝六典以治國而阜成兆民阜謂厚其生成謂化成也吕氏曰冢宰相天子統百官則司徒以下無非冢宰所統乃均列一職而併數之為六者綱在網中也乾坤之與六子並列于八方冢宰之與五卿並列于六職也音釋經倡音唱阜房缶反傳治去聲相去聲數所矩反六年五服一朝又六年王乃時巡考制度于四嶽諸侯各朝于方嶽大明黜陟五服侯甸男采衛也六年朝會京師十二年王一巡狩時巡者猶舜之四仲巡狩也考制度者猶舜之協時月正日同律度量衡等事也諸侯各朝方嶽者猶舜之肆覲東后也大明黜陟者猶舜之黜陟幽明也疏數異時繁簡異制帝王之治因時損益者可見矣吕氏曰六卿倡九牧既立為治之綱矣繼以朝覲巡狩之制所以振其綱也卿牧倡和固有體統然多歷年歲非時有以振之豈無壅滯而不逹乎六年一朝所以達其壅也豈無廢壞而不修乎又六年王時巡至大明黜陟所以修其廢也諸侯既親承德意于天子天子復親考制度于諸侯禮樂刑政斯四達而不悖矣是制也嘗見于虞書今復見于此驗其疏數而世之升降可推矣林氏曰此皆斟酌舜事而行之者也舜五載一巡狩此十二年何也文中子曰舜一載而巡四嶽兵衛少而徴求寡也以是觀之則周兵衛日衆徴求日多故不能五年而以十二年也音釋經朝馳遙反下同傳疏數音疏朔治去聲王曰嗚呼凡我有官君子欽乃攸司慎乃出令令出惟行弗惟反以公滅私民其允懷建官之體統前章既訓迪之矣此則居守官職者咸在曰凡有官君子者合尊卑小大而同訓之也反者令出不可行而壅逆之謂言敬汝所主之職謹汝所出之令令出欲其行不欲其壅逆而不行也以天下之公理滅一己之私情則令行而民莫不敬信懷服矣學古入官議事以制政乃不迷其爾典常作之師無以利口亂厥官蓄疑敗謀怠忽荒政不學牆面蒞事惟煩學古學前代之法也制裁度也迷錯繆也典常當代之法也周家典常皆文武周公之所講畫至精至備凡蒞官者謹師之而已不可喋喋利口更改而紛亂之也積疑不決必敗其謀怠惰忽略必荒其政人而不學其猶正牆靣而立必無所見而舉錯煩擾也蘇氏曰鄭子産鑄刑書晉叔向譏之曰昔先王議事以制不為刑辟其言蓋取諸此先王人法並任而任人為多故律設大法而已其輕重之詳則付之人臨事而議以制其出入故刑簡而政清自唐以前治罪科條正于今律令而已人之所犯日變無窮而律令有限以有限治無窮不聞有所闕豈非人法兼行吏猶得臨事而議乎今律令之外科條數萬而不足于用有司請立新法者日益不已嗚呼任法之弊一至于此哉音釋經蓄敕六反傳度達各反喋音牒多言也更平聲舉錯音措辟毗亦反戒爾卿士功崇惟志業廣惟勤惟克果斷乃罔後艱此下申戒卿士也王氏曰功以智崇業以仁廣斷以勇克此三者天下之達道也吕氏曰功者業之成也業者功之積也崇其功者存乎志廣其業者存乎勤勤由志而生志待勤而遂雖有二者當幾而不能果斷則志與勤虛用而終蹈後艱矣林氏曰猛虎之猶豫不如蜂蠆之致螫賁育之狐疑不如童子之必至臨事而必斷乃為可以無後艱三山陳氏曰志非果斷則不立勤非果斷則易倦音釋經斷都玩反傳幾音機位不期驕祿不期侈恭儉惟德無載爾偽作德心逸日休作偽心勞日拙貴不與驕期而驕自至祿不與侈期而侈自至故居是位當知所以恭饗是祿當知所以儉然恭儉豈可以聲音笑貌為哉當有實得於己不可從事於偽作德則中外惟一故心逸而日休休焉作偽則掩護不暇故心勞而日著其拙矣或曰期待也位所以崇德非期于為驕祿所以報功非期于為侈亦通音釋經載作代反傳掩與掩同居寵思危罔不惟畏弗畏入畏居寵盛則思危辱當無所不致其祇畏苟不知祇畏則入於可畏之中矣陳氏大猷曰寵謂祿位榮寵也寵與危常相尋人臣居寵必當思危無往而不畏不畏則驕侈放恣必入于可畏之禍矣推賢讓能庶官乃和不和政厖舉能其官惟爾之能稱匪其人惟爾不任賢有德者也能有才者也王氏曰道二義利而已推賢讓能所以為義大臣出于義則莫不出于義此庶官所以不爭而和蔽賢害能所以為利大臣出于利則莫不出于利此庶官所以爭而不和庶官不和則政必雜亂而不理矣稱亦舉也所舉之人能修其官是亦爾之所能舉非其人是亦爾不勝任古者大臣以人事君其責如此夏氏曰能其官謂了其所職也舉人而能其官則彼之能即爾之能蓋非爾舉之則彼無自而顯其能也所舉非其人則彼之不能其職即爾之不職蓋彼之不能任職由爾所致也陳氏大猷曰為政莫大于舉賢才莫不善于蔽賢疾能音釋經推通回反厖莫江反稱平聲任如鴆反傳勝平聲王曰嗚呼三事暨大夫敬爾有官亂爾有政以佑乃辟永康兆民萬邦惟無斁三事即立政三事也亂治也篇終歎息上至三事下至大夫而甲戒敕之也其不及公孤者公孤德尊位隆非有待于戒敕也王氏曰天之所以立君君之所以設官分職者凡以安民而已民永安則萬邦戴上無厭斁矣音釋經辟必益反斁音亦君陳君陳臣名唐孔氏曰周公遷殷頑民於下都周公親自監之周公既殁成王命君陳代周公此其䇿命之詞史録其書以君陳名篇今文無古文有音釋傳監古銜反王若曰君陳惟爾令德孝恭惟孝友于兄弟克施有政命汝尹兹東郊敬哉言君陳有令德事親孝事上恭惟其孝友于家是以能施政于邦孔子曰居家理故治可移于官陳氏曰天子之國五十里為近郊自王城言之則下都乃東郊之地故君陳畢命皆指下都為東郊音釋傳治去聲下章傳同昔周公師保萬民民懷其德往慎乃司兹率厥常懋昭周公之訓惟民其乂周公之在東郊有師之尊有保之親師教之保安之民懷其德君陳之往但當謹其所司率循其常勉明周公之舊訓則民其治矣蓋周公既殁民方思慕周公之訓君陳能發明而光大之固宜其翕然聽順也我聞曰至治馨香感于神明黍稷非馨明德惟馨爾尚式時周公之猷訓惟日孜孜無敢逸豫吕氏曰成王既勉君陳昭周公之訓復舉周公精微之訓以告之至治馨香以下四語所謂周公之訓也既言此而揭之以爾尚式時周公之猷訓則是四言為周公之訓明矣物之精華固無二體然形質止而氣臭升止者有方升者無間則馨香者精華之上逹者也至治之極馨香發聞感格神明不疾而速凡昭薦黍稷之苾芬是豈黍稷之馨哉所以苾芬者實明德之馨也至治舉其成明德循其本非有二馨香也周公之訓固為精微而舉以告君陳尤當其可自殷頑民言之欲其感格非可刑驅而勢迫所謂洞達無間者蓋當深省也迹自周公法度言之典章雖具苟無前人之德則索然萎薾徒為陳也故勉之以用是猷訓惟日孜孜而無敢逸豫焉是訓也至精至微非日新不已深致篤敬之功孰能與于斯音釋經治去聲傳復扶又反間去聲下同苾蒲必反省息井反索昔各反萎於危反薾字本從􅚿乃結諾協二反廋貌與去聲凡人未見聖若不克見既見聖亦不克由聖爾其戒哉爾惟風下民惟草未見聖如不能得見既見聖亦不能由聖人情皆然君陳親見周公故特申戒以此君子之德風也小人之德草也草上之風必偃君陳克由周公之訓則商民亦由君陳之訓矣圖厥政莫或不艱有廢有興出入自爾師虞庶言同則繹師衆虞度也言圖謀其政無小無大莫或不致其難有所當廢有所當興必出入反覆與衆共虞度之衆論既同則又紬繹而深思之而後行也蓋出入自爾師虞者所以合乎人之同庶言同則繹者所以斷于己之獨孟子曰國人皆曰賢然後察之國人皆曰可殺然後殺之庶言同則繹之謂也陳氏大猷曰出謀之國人也入謀之左右也音釋傳度達各反紬音抽斷都玩反爾有嘉謀嘉猷則入告爾后于內爾乃順之于外曰斯謀斯猷惟我后之德嗚呼臣人咸若時惟良顯哉言切于事謂之謀言合于道謂之猷道與事非二也各舉其甚者言之良以德言顯以名言或曰成王舉君陳前日已陳之善而歎息以美之也葛氏曰成王殆失斯言矣欲其臣善則稱君人臣之細行也然君既有是心至于有過則將使誰執哉禹聞善言則拜湯改過不吝端不為此言矣嗚呼此其所以為成王歟音釋傳稱平聲行胡孟反王曰君陳爾惟𢎞周公丕訓無依勢作威無倚法以削寬而有制從容以和此篇言周公訓者三曰懋昭曰式時至此則𢎞周公之丕訓欲其益張而大之也君陳何至依勢以為威倚法以侵削者然勢我所有也法我所用也喜怒豫奪毫髮不于人而于己是私意也非公理也安能不作威以削乎君陳之世當寬和之和時也然寬不可一于寬必寬而有其制和不可一于和必從容以之而後可以和厥中也音釋經從七恭反傳豫音興殷民在辟豫曰辟爾惟勿辟豫曰宥爾惟勿宥惟厥中上章成王慮君陳之徇己此則慮君陳之徇君也言殷民之在刑辟者不可徇君以為生殺惟當審其輕重之中也音釋經辟毗亦反本章至下章並同有弗若于汝政弗化于汝訓辟以止辟乃辟其有不順于汝之政不化于汝之訓刑之可也然刑期無刑刑而可以止刑者乃刑之此終上章之辟狃于姦宄敗常亂俗三細不宥狃習也常典常也俗風俗也狃于姦宄與夫毁敗典常壤亂風俗人犯此三者雖小罪亦不可宥以其所關者大也此終上章之宥胡氏曰姦宄敗常亂俗似難分為三故古注只作三犯即刑過無小之意金氏曰上文述君陳有善則稱君之行此又勉之執法揆理勿徇上意音釋經狃女九反敗比遇反傳夫音扶壞音怪爾無忿疾于頑無求備于一夫無忿疾人之所未化無求備人之所不能音釋經無與毋通忿憮吻方問二反必有忍其乃有濟有容德乃大孔子言小不忍則亂大謀必有所思然後能有所濟然此猶有堅制力蓄之意若洪裕寬綽恢恢乎有餘地者乃德之大也忍言事容言德各以其深淺言也簡厥修亦簡其或不修進厥良以率其或不良修謂其職業良謂其行義職業有修與不修其簡而別之則人勸功進行義之良者以率其不良則人勵行陳氏大猷曰修者方修于善良者已進于善音釋傳行胡孟反别筆列反惟民生厚因物有遷違上所命從厥攸好爾克敬典在德時乃罔不變允升于大猷惟豫一人膺受多福其爾之休終有辭于永世言斯民之生其性本厚而所以澆薄者以誘于習俗而為物所遷耳然厚者既可遷而薄則簿者豈不可反而厚乎反而歸厚特非聲音笑貌之所能為耳民之于上固不從其令而從其好大學言其所令反其所好則民不從亦此意也敬典者敬其君臣父子兄弟夫婦朋友之常道也在德者得其典常之道而著之於身也蓋知敬典而不知在德則典與我猶二也惟敬典而在德焉則所敬之典無非實有諸己實之感人捷於桴鼓所以時乃罔不變而信升于大猷也如是則君受其福臣成其美而有令名于永世矣音釋經好去聲傳澆堅堯反薄也令去聲下同好去聲下同著陟略反桴音孚鼓椎也顧命顧還視也成王將崩命羣臣立康王史序其事為篇謂之顧命者鄭玄云回首曰顧臨死回顧而發命也今文古文皆有吕氏曰成王經三監之變王室幾搖故此正其終始特詳焉顧命成王所以正其終康王之誥康王所以正其始音釋傳還音旋幾音機惟四月哉生魄王不懌始生魄十六日王有疾故不悅懌甲子王乃洮頮水相被冕服慿玉几王發大命臨羣臣必齋成沐浴今疾病危殆故但洮頮水扶相者被以衮冕慿玉几以發命新安王氏曰盥手曰洮沃面曰頮三山陳氏曰吉人臨死之際猶不忘敬如此音釋經洮徒刀反音與桃同音叨者水名頮音悔相去聲慿皮氷反傳盥古緩古玩二反澡也乃同召太保奭芮伯彤伯畢公衛侯毛公師氏虎臣百尹御事同召六卿下至御治事者太保芮伯彤伯畢公衛侯毛公六卿也冢宰第一召公領之司徒第二芮伯為之宗伯第三彤伯為之司馬第四畢公領之司寇第五衛侯為之司空第六毛公領之太保畢毛三公兼也芮彤畢衛毛皆國名入為天子公卿師氏大夫官虎臣虎賁氏百尹百官之長及諸御事者平時則召六卿使率其屬此則將發顧命自六卿至御事同以王命召也林氏曰後世人君將托後嗣獨引親信入受遺詔謂之顧命之臣漢唐之末國嗣多立於戚宦或有夜半禁中出片紙以某人為嗣羣臣拱手莫敢違雖有嫡嗣不能屬於大臣倉卒之際廢立紛然顧命之書誠萬世之法音釋經召直笑反芮如稅反周同姓國彤徒宗反姒姓國畢衛毛皆文王子傳治平聲下同召公上實照反朱子語録云召公畢公毛公是三公芮伯彤伯衛侯是三孤孔疏云以髙官兼攝下司漢世以來謂之領故召畢毛皆稱公稱領芮彤衛但稱本爵賁音奔長上聲師音帥王曰嗚呼疾大漸惟幾病日臻既彌留恐不獲誓言嗣茲豫審訓命汝此下成王之顧命也自歎其疾大進惟危殆病日至既彌甚而留連恐遂死不得誓言以嗣續我志此我所以詳審發訓命汝統言曰疾甚言曰病吕氏曰成王去崩才一日猶盥洗以致其潔冠服以致其嚴顧托之言淵奧精明蓋臨衆之敬不以困憊廢而素定之理雖垂沒固炯然也惟善治氣者歷疾病而不惰善養心者臨死而不昏此豈一朝一夕之積哉音釋經幾音機昔君文王武王宣重光奠麗陳教則肄肄不違用克達殷集大命武猶文謂之重光猶舜如堯謂之重華也奠定麗依也言文武宣布重明之德定民所依陳列教條則民皆服習而不違天下化之用能達於殷邦而集大命於周也新安王氏曰此原先王創業之難也音釋經重傳容反麗音離又音隸肄羊至反習也在後之侗敬迓天威嗣守文武大訓無敢昏逾侗愚也成王自稱言其敬迎上天威命而不敢少忽嗣守文武大訓而無敢昏逾天威天命也大訓述天者也於天言天威於文武言大訓非有二也音釋經侗音同今天降疾殆弗興弗悟爾尚明時朕言用敬保元子釗𢎞濟于艱難唐孔氏曰殆危也不能興起不能覺悟言必死也釗康王名成王言今天降疾我身殆將必死弗興弗悟爾庶幾明是我言用敬保元子釗大濟于艱難曰元子者正其統也夏氏曰王業以艱難而成成王今將矣死則艱難之業責之康王音釋經釗之遙反音與昭同柔逺能邇安勸小大庶邦懷來馴擾安寧勸導皆君道所當盡者合逺邇小大而言又以見君德所施公平周溥而不可有所偏滯也音釋經見形甸反溥音普思夫人自亂于威儀爾無以釗冒貢于非幾陳氏大猷曰夫人猶言大凡人也亂治也威者有威可畏儀者有儀可象舉一身之則而言也蓋人受天地之中以生是以有動作威儀之則成王思夫人之所以為人者自治於威儀耳自治云者正其身而不假於外求也貢進也成王又言羣臣其無以元子而冒進於不善之幾也蓋幾者動之微而善惡之所由分也非幾則發於不善而陷於惡矣威儀舉其發於外者而勉之也非幾舉其發於中者而戒之也威儀之治皆本一念一慮之微可不謹乎孔子所謂知幾子思所謂慎獨周子所謂幾善惡者皆致意於是也成王垂絶之言而拳拳及此其有得於周公者亦深矣蘇氏曰死生之際聖賢之所甚重也成王將崩之一日被冕服以見百官出經逺保世之言其不死於燕安婦人之手也明矣其致刑措宜哉音釋經夫音扶無與毋通幾音機傳治平聲下同見形甸反茲既受命還出綴衣于庭越翼日乙丑王崩綴衣幄帳也羣臣既退徹出幄帳於庭也唐孔氏曰王在庭內幄帳中發顧命既復反於寢處以王不復能臨此坐故徹出之王氏炎曰成王幼立三叔流言王不無疑則其性非卓然高明也臨終之際乃能如此得非周召師保輔翼教誨有以養成其德意誠心正雖死生之際而志氣清明如是乎是知三代而下人主天資未必不及東古人而德不逮者無古帝王之學也大記云疾病君徹懸首於北墉下是也於其明日王崩音釋傳幄帳孔疏云四合象宫室曰幄王所居之帳也上有承塵皆以繒為之張於黼扆之上太保命仲桓南官毛俾爰齊侯吕伋以二干戈虎賁百人逆子釗於南門之外延入翼室恤宅宗桓毛二臣各伋太公望子為天子虎賁氏延引也翼室路寢旁左右翼室也太保以冢宰攝政命桓毛二臣使齊侯吕伋以干戈虎賁百人逆太子釗于路寢門外引入路寢翼室為憂居室主也吕氏曰發命者冢宰傳命者兩朝臣承命者勳戚顯諸侯體統尊嚴樞機周密防危慮患之意深矣自入端門萬姓咸觀與天下共之也延入翼室為憂居之宗示天下不可一日無統也唐穆敬文武以降閹寺軌國命易工於宫掖而外庭猶不聞然後知周家之制曲盡備豫雖一條一節亦不可廢也音釋經桓胡官反伋訖立反傳路寢門外南門當是臯門天子五門皆南鄉則臯門乃天子之最南門也朝馳遙反閹衣亷衣檢二反説文云宫中閹閽閉門者寺如字又時吏反寺人奄宦者易夷益反掖夷益反宫中小門也丁卯命作册度新安王氏曰凡喪禮厥明而小斂又厥明而大斂尊卑皆同丁卯命作册度既大斂之後也林氏曰此亦太保之命成王雖有遺命未有册書將傳之於康王故命史作册以紀其言而授之唐孔氏曰既作册書因作受册法度下文升階即位至受同祭饗等是法度也越七日癸酉伯相命士須材伯相召公也召公以西伯為相須取命士取材木以供喪用音釋經相去聲傳供音恭下章傳同喪平聲下章傳同狄設黼扆綴衣狄下士祭統云狄者樂吏之賤者也喪大記狄人設階蓋供喪役而典設張之事也黼扆屏風畫為斧文者設黼扆幄帳如成王生存之日也唐孔氏曰自設黼扆至陳輅各有所司皆自相命不言命者蒙上命士之文也此下皆為將傳顧命而陳儀物也經於四座上言設黼扆綴衣則四座皆設也先施屏風於前又施幄帳於上音釋經扆隱豈反傳張去聲周禮掌次掌邦之張事畫胡卦反按周禮注扆如今之綈素屏風有繡斧文所以示威也牖間南嚮敷重篾席黼純華玉仍几此平時見羣臣覲諸侯之坐也敷設重席所謂天子之席三重者也篾席桃竹枝席也黼白黑雜繒純緣也華彩色也華玉以飾几仍因也因生時所設也周禮吉事變几凶事仍几是也音釋經重傳容反下章並同篾莫結反純之允之閏二反下章並同傳見形甸反天子之席三重周禮司几席云王位設黼扆扆前南鄉管筵紛純加繅席畫純加次席畫純次席即篾席也孔疏云坐席皆敷三重舉其上而言重知其下更有席也繒慈陵反緣俞絹反下章傳並同變几周禮注吉事謂王祭宗廟祼饋繹每事見几神事文示新之也凶事謂凡奠几朝夕相因喪事略也西序東嚮敷重底席綴純文貝仍几此旦夕聽事之座也東西廂謂之序底席蒲席也綴雜彩文貝有文之貝以飾几也吕氏曰就路寢西廂設座東嚮也東序西嚮敷重豐席畫純雕玉仍几此養國老饗羣臣之座也孔氏曰豐席管席也畫純以彩色畫帛為緣雕玉仍几雕鏤玉以飾几也吕氏曰就路寢東廂設座西嚮也音釋經畫胡卦反俗作畫非西夾南嚮敷重筍席玄紛純漆仍几此親屬私燕之座也西廂夾室之前筍席竹席也紛雜也以玄黑之色雜為之緣漆漆几也牖間兩序西夾其席有四牖户之間謂之扆天子負扆朝諸侯則牖間南嚮之席坐之正也其三席各隨事以時設也將傳先王顧命知神之在此乎在彼乎故兼設平生之坐也音釋經夾訖洽反筍聳尹反紛如字陸孚云反周禮司几筵鄭司農注紛讀為豳又讀為和粉之粉謂白繡也傳夾室孔疏云天子之室有左右房房即室也以其夾中央之太室故曰夾室竹席孔疏引爾雅注竹初萌生謂之筍取筍之皮以為席也朝馳遙反按天子朝覲聽治養老私燕各有定處平居四席各因事而設於其處今則並設於殯前也越玉五重陳寶赤刀大訓𢎞璧琬琰在西序大玉夷玉天球河圖在東序胤之舞衣大貝鼖鼓在西房兊之戈和之弓垂之竹矢在東房於東西序坐北列玉五重及陳先王所寶器物赤刀赤削也大訓三皇五帝之書訓誥亦在焉文武之訓亦曰大訓𢎞璧大璧也琬琰圭名夷常也球嗚球也河圖伏犧時龍馬負圖出於河一六位北二七位南三八位東四九位西五十居中者易大傳所謂河出圖是也胤國名胤國所制舞衣大貝如車渠鼖鼓長八尺兊和皆古之巧工垂舜時共工舞衣鼖鼓戈弓竹矢皆制作精巧中法度故歷代傳寶之孔氏曰𢎞璧琬琰大玉夷玉天球玉之五重也吕氏曰西序所陳不惟赤刀𢎞璧而大訓參之東序所陳不惟大玉夷玉而河圖參之則其所寶者斷可識矣愚謂寶玉器物之陳非徒以為國容觀美意者成王平日之所觀閲手澤在焉陳之以象其生存也楊氏中庸傳曰宗器於祭陳之示能守也於顧命陳之示能傳也音釋經重傳容反琬於阮反琰以冉反球音求貝水中介蟲也九真交趾所産大者至一二尺煮其甲以備器用或白質黃文或黃質白文或白質如玉紫點為文昔行列相當鼖符分反傳削音笑刀室也字今作鞘孔傳云寶刀赤刀削朱其刀室因曰赤刀也禮記少儀云刀授頴削授拊削音笑正與此同又周禮築氏為削音如字却非此也書疏謂削為刀之別名禮記疏謂削為曲刀皆因周禮而誤釋也傳柱戀反下庸傳同車渠上尺遮反車渠蛤屬生南海中大者如箕背有渠壟如蚶殼攻以為器如白玉共音恭中去聲斷都玩反大輅在賓階面綴輅在阼階面先輅在左孰之前次輅在右孰之前大輅玉輅也綴輅金輅也先輅木輅也次輅象輅革輅也王之五輅玉輅以祀不以封為最貴金輅以封同姓為次之象輅以封異姓為又次之革輅以封四衛為乂次之木輅以封蕃國為最賤其行也貴者宜自近賤者宜逺也王乘玉輅綴之者金輅也故金輅謂之綴輅最逺者木輅也故木輅謂之先輅以木輅為先輅則革輅象輅為次輅矣賓階西階也阼階東階也面南嚮也孰門側堂也五輅陳列亦象成王之生存也周禮典輅云若有大祭祀則出輅大喪大賓客亦如之是大喪出輅為常禮也又按所陳寶玉器物皆以西為上者成王殯在西序故也音釋經輅音路二人雀辨執惠立于畢門之內四人綦辨執戈上刃夾兩階戺一一人冕執劉立于東堂一人冕執鉞立于西堂一人冕執戣立于東垂一人冕執瞿立于西垂一人冕執鋭立于側階辨士服雀辨赤色辨也綦辨以文鹿子皮為之惠二隅矛路寢門一各畢門上刃刃外嚮也堂亷曰戺冕大夫服劉鉞屬戣瞿皆戟屬鋭當作鋭説文曰鋭侍臣所執兵從金允聲周書曰一人冕執鋭讀若允東西堂路寢東西廂之前堂也東西垂路寢東西序之階上也側階北階之階上也吕氏曰古者執戈戟以宿衛王宫皆士大夫之職無事而奉燕私則從容養德有膏澤之潤有事而司禦侮則堅明守義而無腹心之虞下及秦漢陛楯執戟尚餘一二此制既廢人主接士大夫者僅有視朝數刻而周廬陛楯或環以椎理嚚悍之徒有志於復古者當深繹也三山陳氏曰自設黼扆至此典章文物之備豈為華侈之具哉一以象先王平生所坐所實所乘所衛以起嗣王之追慕而盡誠絽述也一以昭先王委重投艱之意使嗣王肅敬以祇承也一以起羣臣諸侯之尊敬想慕先王而繫心於嗣王也一以表人主之崇髙富貴尊無二上而傳授之正如此以絶天下覬覦之萌也音釋經綦音其升皮變反夾訖洽反戺鉏里反音與士同鉞音越戣音逵瞿權俱反又作鑺鋭當作鈗音允傳堂亷陸云稜也韻作戵説北陛之階按鄭注以側階為東下階是也雜記稱夫人升自側階注亦云旁階也嗣君自翼室適殯所往還必由之地故特備儀衛焉從士恭反楯堅尹反執戟史記秦始皇置酒而天雨陛楯皆霑寒漢髙帝紀謁者執楯執戟注云親近陛衛也叔孫通傳百官執戟傳警又東方朔云位不過侍郎官不過執戟曹子建書云揚子雲先朝執戟之臣耳此則士大夫任此職之驗也朝馳遙反周廬史記秦紀周廬設卒甚謹又班固兩都賦周廬千列注宿衛之廬周於官也椎理上傳椎反史記王溫舒椎理為姦徐廣注椎殺人而理之又貨殖傳攻剽椎理王麻冕黼裳由賓階隮卿士邦君麻冕蟻裳入即位吕氏曰儀物既備然後延康王受顧命而踐阼自是始稱王麻冕三十升麻為麻冕也隮升也康王吉服自西階升堂以受先王之命故由賓階也蟻玄色公卿大夫及諸侯皆同服亦廟中之禮不言升階者從王賓階也入即位者各就其位也吕氏曰麻冕黼裳王祭服也卿士邦君祭服之裳皆纁今蟻裳者蓋無事於奠祝不欲純用吉服有位於班列不可純用凶服酌吉凶之間示禮之變也音釋經隮箋西反蟻語綺反傳三十升麻為冕凡布以八十縷為一升太保太史太宗皆麻冕彤裳太保承介圭上宗奉同瑁由阼階隮太史秉書由賓階隮御王册命太宗宗伯也彤纁也太保受遺也介大也大圭天子之守圭長尺有二寸同爵名祭以酌酒者瑁方四寸邪刻之冒諸侯之圭璧以齊瑞信也太保宗伯以先王之命奉符寶以傳嗣君有主道焉故升自阼階太史以册命御王故持書由賓階以升陳氏大猷曰太保兼冢宰總大權故承介圭宗伯主祭祀朝覲之禮故奉同瑁林氏曰書即册命秉言持之以升御言奉之以進音釋經彤徒宗反奉音捧又如字瑁音冒傳相去聲守舒究反曰皇后憑玉几道揚末命命汝嗣訓臨君周邦率循大卞燮和天下用答揚文武之光訓成王顧命之言書之册矣此太史口陳者也皇大后君也言大君成王力疾親憑玉几道揚臨終之命命汝嗣守文武大訓曰汝者父前子名之義卞法也臨君周邦位之大也率循大卞法之大也燮和天下和之大也居大位由大法致大和然後可以對揚文武之光訓也音釋經卞皮變反王再拜興答曰眇眇豫末小子其能而亂四方以敬忌天威眇小而如亂治也王拜受顧命起答太治史曰眇眇然豫微末小子其能如父祖四方以敬忌天威乎謙辭退托於不能也顧命有敬迓天威嗣守文武大訓之語故太史所告康王所答皆於是致意焉音釋傳治平聲乃受同瑁王三宿三祭三吒上宗曰饗陳氏大猷曰已受册則為王矣於是受同瑁於太宗王同以奉祭承大統瑁以臨朝握大權乃酌酒祭告成已受所傳顧命也宿進爵也祭祭酒也吒奠爵也禮成於三故三宿三祭三吒葛氏曰受上宗同瑁則受太保介圭可知上宗曰饗者傳神命以饗告也音釋經宿字本作肅古通用爾雅云肅進也祭吉祭尸受酒灌於地此非吉祭不近尸故王代尸祭酒也吒陟嫁反説文引書作託從口託聲音當故反注云奠爵也孔疏云三進爵者從立處三進至神所也三祭酒者三酹酒於神至也每一酹酒則奠爵於地三進各用一爵非一爵而三反也太保受同降盥以異同秉璋以酢授宗人同拜王答拜太保受王所吒之同而下堂盥洗更用他同秉璋以酢酢報祭也祭禮君執圭瓉祼尸太宗執璋瓉亞祼報祭亦亞祼之類故亦秉璋也以同授宗人而拜尸王答拜者代尸拜也宗人小宗伯之屬相太保酢者也太宗供王故宗人供太保唐孔氏曰酢謂亞獻也新安王氏曰無終獻者此非正祭也音釋經酢疾各反太宗受同句降盥句以異同秉璋以酢句傳洗蘇典反更平聲瓉才旱木贊二反祼古玩反相去聲供音恭下同太保受同祭嚌宅授宗人同拜王答拜以酒至齒曰嚌太保復受同以祭飲福至齒宅居也太保退居其所以同授宗人又拜王復答拜大保飲福至齒者方在喪疚歆神之賜而不甘其味也若王則喪之主非徒不甘味雖飲福亦廢也音釋經嚌才詣反傳復扶又反下同喪平聲下同太保降收諸侯出廟門俟太保下堂有司收徹器用廟門路寢之門也成王之殯在焉故曰廟言諸侯則卿士以下可知俟者俟見新君也真氏曰此篇見周公養成君德之效又見召公當危難之際區處周密皆可為來世法音釋經見形甸反康王之誥今文古文皆有但今文合于顧命王出在應門之內太保率西方諸侯入應門左畢公率東方諸侯入應門右皆布乘黃朱賓稱奉圭兼幣曰一二臣衛敢執壤奠皆再拜稽首王羲嗣德答拜漢孔氏曰王出畢門立應門內鄭氏曰周禮五門一曰臯門二曰雉門三曰庫門四曰應門五曰路門路門一曰畢門外朝在路門外則應門之內蓋內朝所在也周中分天下諸侯主以二伯自陜以東周公主之自陜以西召公主之召公率西方諸侯蓋西伯舊職畢公率東方諸侯則繼周公為東伯矣諸侯入應門列于左右布陳也乘四馬也諸侯皆陳四黃馬而朱其鬛以為廷實或曰黃朱若篚厥玄黃之類賓諸侯也稱舉也諸侯舉所奉圭兼幣曰一二臣衛一二見非一也為王蕃衛故曰臣衛敢執壤地所出奠贄皆再拜首至地以致敬義宜也義嗣德云者史氏之辭也康王宜嗣前人之德故答拜也吳氏曰穆公使人弔公子重耳重耳稽顙而不拜穆公曰仁夫公子稽顙而不拜則未為後也蓋為後者拜不拜故未為後也弔者含者襚者升堂致命主孤拜稽顙成為後者也康王之見諸侯君以為不當拜而不拜則疑未為後也且純乎吉也答拜既正其為後且知其以喪見也音釋經應平聲按應字平聲為正音去聲為借音故陸氏於諸經中平聲者無音去聲者音應對之應又如治字覆字等極多故陸氏音者皆借音無音者本音讀者詳之禮記疏云應當也謂南嚮當朝正門也左右程伯圭曰左右二字當自為句言趨而左右也乘去聲稱平聲傳外朝馳遙反下同周禮注天子外朝一內朝二外朝在庫門之外聽獄蔽訟之朝也治朝在路門之外王曰視治之朝也燕朝在路門之內會宗人圖嘉事之朝也陜失冉反史記注𢎞農郡陜縣是也鬛力涉反見形甸反下並同重耳上傳容反晉文公名夫音扶含朝紺反贈喪珠玉曰含襚音遂贈喪衣服曰襚喪平聲太保暨芮伯咸進相揖皆再拜稽首曰敢敬告天子皇天改大邦殷之命惟周文武誕受羑若克恤西土冢宰及司徒與羣臣皆進相揖定位又皆再拜稽首陳戒於王曰敢敬告天子示不敢輕告且尊稱之所以重其聽也曰大邦殷者明有天下不足恃也羑若未詳蘇氏曰羑羑里也文王出羑里之囚天命自是始順仁山金氏曰羑古文作按説文即誘字也羑若謂天之隂誘助訓也舊説皆不考西土文武所興之地言文武所以大受命者以其能恤西土之衆也進告不言諸侯以內見外張氏曰言克恤西土以文武基業本於西土示不忘本也吕氏曰二伯率諸侯列門左右朝會分班儀也太保及芮伯咸進相揖朝會合班儀也始兩分班則諸侯兩列西伯與東伯之位相對今而合班則六卿前列冢宰與司徒之位相次也音釋經羑以九反傳見形甸反惟新陟王畢協賞罰戡定厥功用敷遺後人休今王敬之哉張皇六師無壞我高祖寡命陟升遐也成王初崩未葬未諡故曰新陟王畢盡協合也好惡在理不在我故能盡合其賞之所當賞罰之所當罰而克定其功用施及後人之休美今王嗣位其敬勉之哉皇大也張皇六師大戒戎備無廢壞我文武艱難寡德之基命也按召公此言若導王以尚威武者然守成之世多溺宴安而無立志苟不詰爾戎兵奮揚武烈則廢弛怠惰而陵遲之漸見矣成康之時病正在是故周公於立政亦懇懇言之後世墜先王之業忘祖父之讎上下苟安甚至於口不言兵亦異於召公之見矣可勝歎哉音釋經遺去聲壞音怪傳好惡並去聲施以豉反漸見形甸反勝平聲王若曰庶邦侯甸男衛惟豫一人釗報誥報誥而不及羣臣者以外見內康王在喪故稱名春秋嗣王在喪亦書名也音釋經見形甸反喪平聲昔君文武丕平富不務咎底至齊信用昭明于天下則亦有熊羆之士不二心之臣保乂王家用端命于上帝皇天用訓厥道付畀四方丕平富者溥博均平薄斂富民言文武德之廣也不務咎者不務咎惡輕省刑罰言文武罰之謹也底至者推行而底其至也齊信者兼盡而極其誠也文武務德不務罰之心推行而底其至兼盡而極其誠內外充實故光輝發越用昭明于天下蓋誠之至者不可掩也而又有熊羆武勇之士不二心忠實之臣戮力同心保乂王室文武用受正命於天下上天用順文武之道而付之以天下之大也康王言此者求助羣臣諸侯之意音釋傳斂力驗反省所景反乃命建侯樹屏在我後之人今豫一二伯父尚胥暨顧綏爾先公之臣服于先王雖爾身在外乃心罔不在王室用奉恤厥若無遺鞠子羞天子稱同姓諸侯曰伯父康王言文武所以命建侯邦植立蕃屏者意蓋在我後之人也今我一二伯父庶幾相與顧綏爾祖考所以臣服于我先王之道雖身守國在外乃心當常在王室用奉上之憂勤其順承之毋遺我稚子之耻也音釋經屏必郢反無與母通遺去聲羣公既皆聽命相揖趨出王釋冕反喪服始相揖者揖而進也此相揖者揖而退也蘇氏曰成王崩未葬君臣皆冕服禮歟曰非禮也謂之變禮可乎曰不可禮變於不得已嫂非溺終不援也三年之喪既成服釋之而即吉無時而可者曰成王顧命不可以不傳既傳不可以喪服受也曰何為其不可也孔子曰將冠子未及期日而有齊衰大功之喪則因喪服而冠冠吉禮也有可以喪服行之受顧命見諸俟獨不可以喪服乎太保使太史奉册受王于次諸侯入哭於路寢而見王於次王喪服受教戒諫哭踊答拜聖人復起不易斯言矣春秋傳曰鄭子皮如晉葬晉平公將以幣行子産曰喪安用幣子皮固請以行既葬諸侯之大夫欲因見新君叔向辭之曰大夫之事畢矣而乂命孤孤斬焉在衰絰之中其以嘉服見則喪禮未畢其以喪服見是重受弔也大夫將若之何皆無辭以退今康王既以嘉服見諸侯而又受乘黃玉帛之幣使周公在必不為此然則孔子何取此書也曰至矣其父子君臣之間教戒深切著明足以為後世法孔子何為不取哉然其失禮則不可不辨音釋經喪平聲傳喪平聲下並同冠古玩反下同齊衰音咨催見形甸反下並同踊音勇復扶又反衰絰音催耋重儲用反見昭公十年畢命康王以成周之衆命畢公保釐此其册命也今文無古文有吕氏曰周公始遷商民善惡並育所以安反側也至君陳則商民浸服周化故簡修進良猶未大區别也至康王則世變風移為善者衆其不善者亦不能無怙惡之失苟猶兼蓄並容則餘孽不除終為良民之害故命畢公分别其居里不惟惡不能染善而惡者亦將無以自容勢不得不入於善矣此周之治所以成也蓋惟此時可以舉此政為治之序固如此惟十有二年六月庚午朏越三日壬申王朝步自宗周至于豐以成周之衆命畢公保釐東郊康王之十二年也畢公嘗相文王故康王就豐文王廟命之成周下都也保安釐理也保釐即下文旌别淑慝之謂蓋一代之治體一篇之宗要也音釋傳相去聲别筆列反王若曰嗚呼父師惟文王武王敷大德于天下用克受殷命畢公代周公為太師也文王武王布大德于天下用能受殷之命言得之之難也惟周公左右先王綏定厥家毖殷頑民遷于洛邑密邇王室式化厥訓既歷三紀世變風移四方無虞豫一人以寧十二年曰紀父子曰世周公左右文武成王安定國家謹毖頑民遷于洛邑密近王室用化其教既歷三紀世已變而風始移四方無虞度之事而豫一人以寧言化之之難也音釋經左右音佐佑傳度達各反道有升降政由俗革不臧厥臧民罔攸勸有升有降猶言有隆有汚也周公當世道方降之時至君陳畢公之世則將升於大猷矣為政者因俗變革故周公毖殷而謹厥始君陳有容而和厥中皆由俗為政者當今之政旌别淑慝之時也苟不善其善則民無所勸慕矣音釋傳汙音烏惟公懋德克勤小物弼亮四世正色率下罔不祗師言嘉績多于先王豫小子垂拱仰成懋盛大之義豫懋乃德之懋小物猶言細行也言畢公既有盛德又能勤於細行輔導四世風采凝峻表儀朝著若大若小罔不祗服師訓休嘉之績蓋多於先王之時矣今我小子復何為哉垂衣拱手以仰其成而已康王將付畢公以保釐之寄故敘其德業之盛而歸美之也音釋經仰魚向反傳行胡孟反朝著上馳遙反下馳據反音與著同左傳昭公十一年叔向曰朝有著定杜注朝內列位常處謂之表著復扶又反王曰嗚呼父師今豫祗命公以周公之事往哉今我敬命公以周公化訓頑民之事公其往哉言非周公所為不敢屈公以行也旌别淑慝表厥宅里彰善疸惡樹之風聲弗率訓典殊厥井疆俾克畏慕申書郊圻慎固封守以康四海淑善慝惡疸病也旌善别惡成周今日由俗革之政也表異善人之居里如後世旌表門閭之類顯其為善者而病其為不善者以樹立為善者風聲使顯於當時而傳於後世所謂旌淑也其不率訓典者則殊異其井里疆界使不得與善者雜處禮記曰不變移之郊不變移之遂即其法也使能畏為惡之禍而慕為善之福所為别慝也圻與畿同郊圻之制昔固規畫矣曰申云者申明之也封域之險昔固有守矣曰謹云者戒嚴之也疆域障塞歲久則易湮世平則易玩時緝而屢省之乃所以尊嚴王畿王畿安則四海安矣新安王氏曰商民叛服係天下之安危雖世變風移亦不可不慮故因區别里閭遂并郊畿封守而整齊之也音釋經别筆列反疸多旱反音與亶同畫胡麥反圻解見酒誥篇守舒究反傳塞如字易以豉反緝七入反省息井反政貴有恆辭尚體要不惟好異商俗靡靡利口惟賢餘風未殄公其念哉對暫之謂恆對常之謂異趣完具而已之謂體衆體所會之謂要政事純一辭令簡實深戒作聰明趨浮末好異之事凡論治體者皆然而在商俗則尤為對病之藥也蘇氏曰張釋之諫漢文帝秦任刀筆之吏爭以亟疾苛察相高其弊徒文具無惻隱之實以故不聞其過陵夷至於二世天下土崩今以嗇夫口辨而超遷之臣恐天下隨風靡爭口辨無其實凡釋之所論則康王以告畢公者也音釋經恆胡登反要去聲好去聲傳趣去聲謂旨趣也亟音棘苛寒歌反音與何同急也我聞曰世祿之家鮮克由禮以蕩陵德實悖天道敝化奢麗萬世同流古人論世祿之家逸樂豢養其能由禮者鮮矣既不由禮則心無所制肆其驕蕩陵蔑有德悖亂天道敝壞風化奢侈美麗萬世同一流也康王將言殷士怙侈滅義之惡故先取古人論世族者發之音釋經鮮上聲悖蒲妹蒲沒二反茲殷庶士席寵惟舊怙侈滅義服美于人驕淫矜誇將由惡終雖收放心間之惟艱陳氏大猷曰席猶藉也席寵惟舊言世祿之家也吕氏曰殷士慿藉光寵助發其私意者有自來矣私欲公義相為消長故怙侈必至滅義義滅則無復羞惡之端徒以服飾之美誇之於人而身之不美則莫之耻也流而不反驕淫矜誇百邪並見將以惡終矣洛邑之遷式化厥訓雖已收其放心而其所以防間其邪者猶甚難也夏氏曰周公君臣相繼化之雖收其放心然間之尚難畢公當有以間之下文訓以德義古訓即間之之道也音釋經誇枯瓜反傳長上聲復扶又反羞惡去聲見形甸反資富能訓惟以永年惟德惟義時乃大訓不由古訓于何其訓言殷士不可不訓之也資資財也資富而能訓則心不遷於外物而可全其性命之正也然訓非外立教條也惟德惟義而已德者心之理義者理之宜也德義人所同有也惟德義以為訓是乃天下之大訓然訓非可以己私言也當稽古以為之説蓋善無證則民不從不由古以為訓于何以為訓乎王曰嗚呼父師邦之安危惟茲殷士不剛不柔厥德允修是時四方無虞矣蕞爾殷民化訓三紀之餘亦何足慮而康王拳拳以邦之安危惟繫於此其不苟於小成者如此文武周公之澤其深長也宜哉不剛所以保之不柔所以釐之不剛不柔其德信乎其修矣新安王氏曰忿其不從而制以剛則必怨慮其難制而遇以柔則必玩惟不剛不柔而處以中則德允修而商人化矣吕氏曰始皇以安危係胸奴而急之以剛德宗以安危係藩鎮而緩之以柔故皆以致亂也音釋傳蕞祖外反惟周公克愼厥始惟君陳克和厥中惟公克成厥終三后協心同底于道道洽政治澤潤生民四夷左袵罔不咸賴豫小子永膺多福殊厥井疆非治之成也使商民皆善然後可謂之成此曰成者預期之也三后所治者洛邑而施及四夷王畿四方之本也吳氏曰道者致治之道也始之中之終之雖時有先後皆能觀其行事觀其用心而有以濟之若出於一時若成於一人謂之協心如此音釋傳非治去聲下致治同所治平聲施以豉反公其惟時成周建無窮之基亦有無窮之聞子孫訓其成式惟乂建立訓順式法也成周指下都而言王氏曰文王都豐武王都鎬成王始宅洛邑成周又洛邑之東郊耳吕氏曰畢公四世元老豈區區立後世名者而勳德之隆亦豈少此康王所以望之者蓋相期以無窮事業乃尊敬之至也音釋經聞音問嗚呼罔曰弗克惟既厥心罔曰民寡惟愼厥事欽若先王成烈以休于前政陳氏大猷曰事之不立非視之太重而畏其難則視之太輕而忽其易今公無謂不能而畏之惟當盡其心無謂民少而忽之惟當敬其事蓋能盡其心則雖難者無不舉不謹其事則易者不能舉也張氏曰內盡其心外謹其事則能敬順成王之成烈以休美周公君陳之政矣新安王氏曰觀士民不輕於從周見殷先王德澤之深觀三后化殷卒至於從化見周家仁厚之至此商周之盛非後世之所能及也音釋傳易以豉反君牙君牙臣名穆王命君牙為大司徒此其誥命也今文無古文有吕氏曰穆王書三篇君牙冏命初年書也吕刑末年書也舜命契為司徒止一語而君牙命書至一篇世降而文勝也然周家之典刑文獻在焉音釋經牙陸氏本或作雅王若曰嗚呼君牙惟乃祖乃父世篤忠貞服勞王家厥有成績紀于太常王穆王也康王孫昭王子周禮司勳云凡有功者銘書於王之太常司常云日月為常畫日月為旌旗也孫氏曰紀于太常所以彰顯之又王常所瞻視示不忘也音釋傳畫胡卦反惟豫小子嗣守文武成康遺緒亦惟先王之臣克左右亂四方心之憂危若蹈虎尾涉于春冰緒統緒也若蹈虎尾畏其噬若涉春冰畏其陷言憂危之至以見求助之切也音釋經左右音佐佑傳見形甸反今命爾豫翼作股肱心膂纘乃舊服無忝祖考膂脊也舊服忠貞服勞之事忝辱也欲君牙以其祖考事先王者而事我也𢎞敷五典式和民則爾身克正罔敢弗正民心罔中惟爾之中𢎞敷者大而布之也式和者敬而和之也則有物有則之則君臣之義父子之親夫婦之别長幼之序朋友之信是也典以設教言故曰𢎞敷則以民彝言故曰式和此司徒之教也然教之本則在君牙之身正也中也民則之體而人之所同然也正以身言欲其所處無邪行也中以心言欲其所存無邪思也孔子曰子率以正孰敢不正周公曰率自中此告君牙以司徒之職也陳氏大猷曰以其常行而不可易謂之典以其截然而不可越謂之則教之理雖不外乎人之性教之本則在君牙之身與心正者容有不中中則無有不正身之正勉強修飾者能之心之中非存養純熟不能也故既欲君牙正身以率民身之正尤欲其存心之中以導民心之中則民則和五典惇矣敷典和則因民心之同得者教之爾正爾中即吾心之先得者率之也於身先言爾於心先言民互文耳音釋傳别必列反長上聲行胡孟反夏暑雨小民惟曰怨咨冬祁寒小民亦惟曰怨咨厥惟艱哉思其艱以圖其易民乃寧祁大也暑雨祁寒小民怨咨自傷其生之艱難也厥惟艱哉者歎小民之誠為艱難也思念其難以圖其易民乃安也艱者飢寒之艱易者衣食之易司徒敷五典擾兆民兼教養之職此又告君牙以養民之難也音釋經易以豉反嗚呼丕顯哉文王謨丕承哉武王烈佑啓我後人咸以正罔缺爾惟敬明乃訓用奉若于先王對揚文武之光命追配于前人丕大謨謀烈功也文顯於前武承於後曰謨曰烈各指其實而言之咸以正者無一事不出於正咸罔缺者無一事不致其周密若順對答配匹也前人君牙祖父陳氏櫟曰光命即顯謨武烈不過承文謨雖烈亦謨也所以於文武總言光命也文武之光命成康已對揚之今人能奉若成康所以對揚文武之意者如此則君牙可追配其祖父矣舜命契為司徒不過曰敬敷五教在寬今穆王命君牙其詳雖至於一篇其要不出舜之一言前日𢎞敷五典式和民則曰𢎞曰和即在寬意也此曰敬明乃訓即敬敷意也帝舜此言豈惟穆王不能易萬世職教者不能易也王若曰君牙乃惟由先正舊典時式民之治亂在兹率乃祖考之攸行昭乃辟之有乂先正君牙祖父也君牙由祖父舊職而是法之民之治亂在此而已法則治否則亂也循汝祖父之所行而顯其君之冇乂復申戒其守家法以終之按此篇專以君牙祖父為言曰纘舊服曰無忝曰追配曰由先正舊典曰率祖考攸行然則君牙之祖父嘗任司徒之職而其賢可知矣惜載籍之無傳也陳氏曰康王時芮伯為司徒君牙豈其後耶音釋經治去聲辟必益反傳復扶又反冏命穆王命伯冏為太僕正此其誥命也今文無古文冇吕氏曰陪僕暬御之臣後世視為賤品而不之擇者曾不知人主朝夕與居氣體移養常必由之潛消默奪於冥𡨕之中而明爭顯諫於昭昭之際抑术矣自周公作立政而歎綴衣虎賁知恤者鮮則君德之所繫前此知之者亦罕矣周公表而出之其選始重穆王之用太僕正特作命書至與大司徒略等其知本哉陳氏大猷曰周禮止有太僕下大夫二人此言太僕正正其長也又有祭僕御僕𨽻僕戎僕齋僕道僕田僕等正皆長之上薰陶涵養乎君德下簡擇表率乎羣僚所係甚重故册命焉蘇氏曰昭王南征不復至齊桓乃以問楚是終穆王世君弒而賊不討也王終無憤耻之心乃欲車轍馬迹周於天下今觀君牙伯冏二書皆無哀痛慘怛之意但曰嗣先人宅丕后而已非祭公謀父祈招之詩以止王心王其不沒乎音釋經冏俱永反下書長滿從口非陸云亦作史記作臩傳暬私列反王若曰伯冏惟豫弗克于德嗣先人宅丕后怵惕惟厲中夜以興思免厥愆伯冏臣名穆王言我不能于德繼前人居大君之位恐懼危厲中夜以興思所以免其咎過復齋董氏曰穆王命君牙曰心之憂危若蹈虎尾命伯冏曰怵惕惟厲中夜以興此即立之初知以父讎為耻故言如此然終穆王之世復讎之事無聞焉二篇之書果出於穆王之口歟音釋經怵勑律反昔在文武聰明齊聖小大之臣咸懷忠良其侍御僕從罔匪正人以旦夕承弼厥辟出入起居罔有不欽發號施令罔有不臧下民祗若萬邦咸休侍給侍左御右者御車之官僕從太僕羣僕凡從王者承承順之謂弼正救之謂雖文武之君聰明齊聖小大之臣咸懷忠良固無待於侍御僕從之承弼者然其左右奔走皆得正人則承順正救亦豈小補哉林氏曰左右近習非其人則朝夕漸染入於邪僻而不自知大臣雖賢君心以蠧矣故雖小大忠良必羣僕皆正人而後可音釋經從才用反辟必益反惟豫一人無良實賴左右前後有位之士匡其不及繩愆糾謬格其非心俾克紹先烈無良言其質之不善也匡輔助也繩直糾正也非心非僻之心也先烈文武也陳氏大猷曰文武猶資左右况豫之無良乎匡救其惡而不格其非心則止於東而生於西惟格其非心則拔本塞源末流自善音釋經糾吉酉反謬靡幼反今豫命汝作大正正于羣僕侍御之臣懋乃后德交修不逮大正太僕正也周禮太僕下大夫也羣僕謂祭僕𨽻僕戎僕齊僕之類穆王欲伯冏正其羣僕侍御之臣以勉進君德而交修其所不及或曰周禮下大夫不得為正僕漢孔氏以為太御中大夫蓋周禮太御最長下又有羣與此所謂正于羣僕者合且與君同車最為親近也張氏曰公卿進見有時僕御褻近無間有時者見其尊嚴無間者知其情性方其進見君臣之分甚嚴未易犯其顔色及其褻近君臣之情無間故可糾其過失救過於無間之時易為力救過於已發之後也難為功懋德交修正侍御僕從之職音釋傳齊側皆反周禮夏官司馬祭僕掌視祭祀𨽻僕掌五寢掃除戎僕掌馭戎車齊僕掌馭金路以賓長上聲愼簡乃僚無以巧言令色便辟側媚其惟吉士巧好令善也好其言善其色外飾而無質實者也便者順人之所欲辟者避人之所惡側者姦邪媚者諛説小人也吉士君子也人按此言謹擇乃僚則成周之時凡為官長者皆得自舉其屬不特辟除府史胥徒而已吕氏曰命一伯冏作太僕正使謹擇其僚固不待王親擇此為治之體統也陸贄在唐使諸司長官各舉其屬亦庶幾有見于此音釋經令力正反便毗連反辟四亦反傳惡去聲長上聲特辟必益反僕臣正厥后克正僕臣諛厥后自聖后德惟臣不德惟臣自聖自以為聖也僕臣之賢否係君德之輕重如此吕氏曰自古小人之敗君德為昏為虐為侈為縱曷其有極至於自聖猶若淺之為害穆王獨以是蔽之者蓋小人之蠱其君必使之虛美熏心傲然自聖則謂人莫己若而欲豫言莫之違然後法家拂士日逺而快意肆情之事亦莫或齟齬其間自聖之證既見而百疾從之昏虐侈縱皆其枝葉而不足論也音釋傳敗北邁反拂音弼齟齬上阻咀二音下音語見形甸反爾無昵于憸人充耳目之官迪上以非先王之典汝無比近小人充我耳目之官導君上以非先王之典蓋穆王自量其執德未固恐左右以異端進而蕩其心也音釋經無與毋通傳此毗連反量平聲非人其吉惟貨其吉若時瘝厥官惟爾大弗克祗厥辟惟豫汝辜戒其以貨賄任羣僕也言不于其人之善而惟以貨賄為善則是曠厥官汝大不能敬其君而我亦汝罪矣音釋經辟必益反王曰嗚呼欽哉永弼乃后于彝憲彝憲常法也吕氏曰穆王卒章之命望於伯冏者深且長矣此心不繼造父為御周遊天下將必有車轍馬迹導其侈者果出於僕御之間抑不知伯冏猶在職乎否也穆王豫知所戒憂思深長猶不免躬自蹈之人心操捨之無常可懼哉音釋傳造父上七到反下音甫顓頊之孫蜚亷四世孫趙氏之祖也思去聲操倉刀反吕刑吕侯為天子司寇穆王命訓刑以誥四方史録為篇今文古文皆有按此篇専訓贖刑蓋本舜典金作贖刑之語今詳此書實則不然蓋舜典所謂贖者官府學校之刑爾若五刑則固未嘗贖也五刑之寬惟處以流鞭撲之寬方許其贖今穆王贖法雖大辟亦與其贖免矣漢張敞以討羌兵食不繼建為入穀贖罪之法初亦未嘗及於殺人及盜之罪而蕭望之等猶以為如此則富者得生貧者獨死恐開利路以傷治化曾謂唐虞之世而有是贖法哉穆王巡遊無度財匱民勞至其末年無以為計乃為此一切權宜之術以斂民財夫子録之蓋亦示戒然其一篇之書哀矜側怛猶可以想見三代忠厚之意云爾仁山金氏曰吕刑穆王晚年之書也自昭王南征不復周綱陵夷穆王在位日久中更荒廢雖能自克然風俗日下情偽日滋晚年命吕侯為司寇重修刑法史謂甫侯言於王而修之也故曰吕刑作為誥命頒之天下焉大抵增墨刑之條以盡天下之惡咸官刑大辟之條以逭犯罪之衆刑繁而輕蓋衰世之意也音釋傳校胡教反夫音扶切千結反詳見盤庚篇斂去聲傳柱戀反吕姓也甫國名也甫侯姓吕為天子司寇故亦或稱甫刑惟吕命王享國百年耄荒度作刑以誥四方惟吕命與惟説命語同先此以見訓刑為吕侯之言也耄老而昏亂之稱荒忽也孟子曰從獸無厭謂之荒穆王享國百年車轍馬迹遍于天下故史氏以耄荒二字發之亦以見贖刑為穆王耄荒所訓耳蘇氏曰荒大也大度作刑猶禹曰豫荒度土功荒當屬下句亦通然耄亦貶之之辭也音釋經度達各反傳先先見反見形甸反下同厭於鹽反屬音燭王曰若古有訓蚩尤惟始作亂延及于平民罔不寇賊鴟義姦宄奪攘矯虔言洪荒之世渾厚敦厖蚩尤始開暴亂之端驅扇熏炙延及平民無不為寇為賊鴟義者以鴟張跋扈為義仁山金氏曰矯正也虔劉也謂姦惡寇攘者須制刑以矯正虔劉之也音釋經蚩充之反鴟處脂反傳渾胡昆反鴟張形勢猛悍如鴟之張翼跋扈上蒲揆反下侯古反詩疏云凶橫自恣陵人之貌苗民弗用靈制以刑惟作五虐之刑曰法殺戮無辜爰始淫為劓刵椓黥越茲麗刑并制罔差有辭苗民承蚩尤之暴不用善而制以刑惟作五虐之刑名之曰法以殺戮無罪於是始過為劓鼻刵耳椓竅黥面之法於麗法者必刑之并制無罪不復以曲直之辭為差别皆刑之也音釋經劓牛例反刵而志反椓竹角反黥渠京反麗音離又音𨽻并去聲差初加反傳復扶又反别筆列反民興胥漸泯泯棼棼罔中于信以覆詛盟虐威庶戮方告無辜于上上帝監民罔有馨香德刑發聞惟腥泯泯昏也棼棼亂也民皆悍然興起更相漸染為昏為亂無復誠信相與反覆詛盟而已虐政作威衆被戮者方各告無罪於天天視苗民無有馨香德而刑戮發聞莫非腥穢吕氏曰形於聲嗟窮之反也動於氣臭惡之熟也馨香陽也腥穢隂也故德為馨香而刑發腥穢也音釋經漸將廉反泯面忍反棼敷文反音與紛同又符分反音與焚同覆芳六反詛莊助反監音鑒聞如字又音問皇帝哀矜庶戮之不辜報虐以威遏絶苗民無世在下皇帝舜也以書考之治苗民命伯夷禹稷臯陶皆舜之事報苗之虐以我之威絶滅也謂竄與分北之類遏絶之使無繼世在下國音釋傳治平聲乃命重黎絶地天通罔有降格羣后之逮在下明明棐常鰥寡無蓋重少昊之後黎高陽之後重即羲黎即和也吕氏曰治世公道昭明為善得福為惡得禍民曉然知其所由則不求之渺茫𡨕昧之間常三苗昏虐民之得罪者莫知其端無所控訴相與聽於神祭非其鬼天地人神之典雜揉瀆亂此妖誕之所以興人心之所以不正也在舜當務之急莫先於正人心首命重黎修明祀典天子然後祭天地諸侯然後祭山川高卑上下各有分限絶天地之通嚴幽明之分焄蒿妖誕之説舉皆屏息羣后及在下之臣皆精白一心輔助常道民卒善而得福惡而得禍雖鰥寡之微亦無有蓋蔽而不得自伸者也按國語曰少昊氏之衰九黎亂德民神雜揉家為巫史民瀆齊盟禍災荐臻顓頊受之乃命南正重司天以屬神北正黎司地以屬民使無相侵瀆其後三苗復九黎之德堯復育重黎之後不忘舊者使復典之音釋經重傳容反傳治去聲揉女救反有分扶問反焄蒿上許云反香氣也下呼高反氣蒸出貌字見禮記屏卑正反九黎韋昭云九黎氏九人蚩尤之後也鄭玄云九黎學蚩尤為亂者在蚩尤之後屬音燭韋昭云會也苗復如字堯復扶又反下同皇帝清問下民鰥寡有辭于苗德威惟畏德明惟明清問虛心而問也有辭聲苗之過也苗以虗為威以察為明帝反其道以德威而天下無不畏以德明而天下無不明也乃命三后恤功于民伯夷降典折民惟刑禹平水土主名山川稷降播種農殖嘉穀三后成功惟殷于民恤功致憂民之功也吕氏曰時承蚩尤三苗之蔽妖誕溺人重黎雖區别其大分然蠱惑未易遽勝故伯夷降天地人之典禮使知幽明之分人道之正折民之邪妄所謂折民于刑也蘇氏曰失禮則入刑禮刑一物也伯夷降典以正民心禹平水土以定民居稷降播種以厚民生三后成功以致民之殷盛富庶也孫氏曰伯夷降典教之也禹平水土安之也稷降播種餋之也吕氏曰功盛而民殷盛則防間之者不可廢於是下文即命臯陶作士以刑限制之也音釋傳折之列反種朱用反士制百姓于刑之中以教祗德命臯陶為士制百姓于刑辟之中所以檢其心而教以祗德也吳氏曰臯陶不與三后之列遂使後世以刑官為輕後漢楊賜拜廷尉自以代非法家言曰三后成功惟殷于民臯陶不與蓋吝之也是後世非獨人臣以刑官為輕人君亦以為輕矣觀舜之稱臯陶曰刑期于無刑民協于中時乃功又曰俾豫從欲以治四方風動惟乃之休其所繫乃如此是可輕哉吕氏曰吕刑一篇以刑為主故歷敘本末而歸之於臯陶之刑勢不得與伯夷禹稷雜稱言固有賓主也音釋傳辟毗亦反與去聲下不與同穆穆在上明明在下灼于四方罔不惟德之勤故乃明于刑之中率乂于民棐彞穆穆者和敬之容也明明者精白之容也灼于四方者穆穆明明輝光發越而四達也君臣之德昭明如是故民皆觀感動蕩為善而不能自已也如是而猶有未化者故士師明于刑之中使無過不及之差率乂于民輔其常性所謂刑罰之精華也陳氏櫟曰夫舜不輕於用刑也命臯陶以刑且本之以威明之德繼期民以祗德勤德刑之本必主於德而刑之用必合於中德與中為吕刑一篇之網領此曰惟克天德曰以成三德曰有德惟刑無非以德為本也曰觀于五刑之中曰罔不中聽獄之兩辭曰罔非在中曰咸庶中正曰非德于民之中曰咸中有慶無非以中為用也刑必合於中而後刑即所以為德以此意讀吕刑其庶幾乎典獄非訖于威惟訖于富敬忌罔有擇言在身惟克天德自作元命配享在下仁山金氏曰惟訖之惟與也訖絶也謂唐虞之世典獄之官非但絶于威勢之請託與絶于貨賄之賂遺而已言不為威屈不為利誘也敬忌之至無有擇言在身大公至正純乎天德無毫髮不可舉以示人者天德在我則大命自我作而配享在下矣在下者對天之辭蓋推典獄用刑之極功而至於與天為一者如此三山陳氏曰獄者民命係焉古人以動天地感鬼神臯陶之刑至于四方風動蘇公之刑至于長我王國穆王之刑至于一人有慶兆民賴之天下所以感化王國所以長久人君所以享福皆在於刑非德與天合也不足任此後世以言為慘酷之具輕付之人視古人有間矣王曰嗟四方司政典獄非爾惟作天牧今爾何監非時伯夷播刑之迪其今爾何懲惟時苗民匪察于獄之麗罔擇吉人觀干五刑之中惟時庶威奪貨斷制五刑以亂無辜上帝不蠲降咎于苗苗民無辭于罰乃絶厥世司政典獄漢孔氏曰諸侯也為諸侯主刑獄而言非爾諸侯為天牧養斯民乎為天牧民則今爾何所監懲所當監者非伯夷乎所當懲者非有苗乎伯夷布刑以啓迪斯民捨臯陶而言伯夷者探本之論也麗附也苗民不察於獄辭之所麗又不擇吉人俾觀于五刑之中惟是貴者以威亂政富者以貨奪法斷制五刑亂虐無罪上帝不蠲貸而降罰于苗苗民無所辭其罰而遂殄滅之也音釋經監音鑒麗音離又音𨽻斷都玩反傳為去聲下同舍音捨貸他代反王曰嗚呼念之哉伯父伯兄仲叔季弟幼子童孫皆聽朕言庶有格命今爾罔不由慰日勤爾罔或戒不勤天齊于民俾我一日非終惟終在人爾尚敬逆天命以奉我一人雖畏勿畏雖休勿休惟敬五刑以成三德一人有慶兆民賴之其寧惟永此告同姓諸侯也格至也參錯訊鞫極天下之勞者莫若獄苟有毫髮怠心則民有不得其死者矣罔不由慰日勤者爾所用以自慰者無不以日勤故職舉而刑當也爾罔或戒不勤者刑罰之用一成而不可變者也苟頃刻之不勤則刑罰失中雖深戒之而已施者亦無及矣戒固善心也而用刑豈可以或戒也哉且刑獄非所恃以為治也天以是整齊亂民使我為一日之用而已非終即康誥大罪非終之謂言過之當辟者惟終即康誥小罪惟終之謂言故之當辟者非終惟終皆非我得輕重惟在夫人所犯耳爾當敬逆天命以承我一人畏威古通用威辟之也休宥之也我雖以為辟爾惟勿辟我雖以為宥爾惟勿宥惟敬乎五刑之用以成剛柔正直之德則君慶於上民賴於下而安寧之福其永久而不替矣音釋傳刑當去聲辟毗亦反下並同夫音扶王曰吁來有邦有土告爾祥刑在今爾安百姓何擇非人何敬非刑何度非及陳氏大猷曰吁來者歎而呼之來前有邦諸侯也有土卿大夫有采地者也刑凶器也而謂之祥刑原制刑之本也棐民彝成三德係人心固天命何吉祥如之典獄者以祥用之則無往而非祥矣祥刑非他在於安百姓而已謂使善者有所恃惡者有所懲也新安王氏曰何所當擇豈非所用典獄之人乎何所當敬豈非所用之刑乎何所當度豈非獄辭之所逮及乎漢世詔獄有至數萬人者審度其所當逮者而後可逮之也曰何曰非問答以發其意以明三者之決不可不盡心也音釋經度達各反傳逮徒耐反又湯亥大計二反及也漢刑法注辭之所及則追捕之故謂之逮兩造具備師聽五辭五辭簡孚正于五刑五刑不簡正于五罰五罰不服正于五過兩造者兩爭者皆至也周官以兩造聽民訟具備者詞證皆在也師衆也五辭麗於五刑之辭也簡核其實也孚無可疑也正質也五辭簡核而可信乃質于五刑也不簡者辭與刑參差不應刑之疑者也罰贖也疑於刑則質于罰也不服者辭與罰又不應也罰之疑者也過誤也疑於罰則質于過而宥免之也音釋經造七到反傳麗離𨽻二音核與核同下革反應去聲五過之疵惟官惟反惟內惟貨惟來其罪惟均其審克之疵病也官威勢也反報德怨也內女謁也貨賄賂也來干請也惟此五者之病以出入人罪則以人之所犯坐之也審克者察之詳而盡其能也下文屢言以見其丁寧忠厚之至疵於刑罰亦然但言於五過者舉輕以見重也吕氏曰刑降而為罰罰降而為過然以私而故縱則又非天討也故縱之病有此五者審者察之盡其心克者治之盡其力音釋經疵才支反傳見形甸反下同五刑之疑有赦五罰之疑有赦其審克之刑疑有赦正于五罰也罰疑有赦正于五過也吕氏曰當赦而不赦不當赦而赦所害皆不輕故又戒以審克也簡孚有衆惟貌有稽無簡不聼具嚴天威陳氏大猷曰此承上五辭簡孚而言獄辭簡核孚實衆聽以為可信也唐孔氏曰衆或皆以為可刑或皆以為可赦未得即斷之惟當察其囚貌更有所考合考合復同乃從衆議斷之即周官大司寇五聽辭聽色聽氣聽耳聽目聽也陳氏大猷曰無簡不聽謂獄辭之無核者則為疑獄明矣更不須以貌聽而竟赦之也張氏曰其俱也謂上所言皆敬天威也陳氏大猷曰當輕而重當重而輕則褻慢天威矣其可不致其嚴哉墨辟疑赦其罰百鍰閲實其罪劓辟疑赦其罰惟倍閲實其罪剕辟疑赦其罰倍差閲實其罪宫辟疑赦其罰六百鍰閲實其罪大辟疑赦其罰千鍰閲實其罪墨罰之屬千劓罰之屬千剕罰之屬五百宫罰之屬三百大辟之罰其屬二百五刑之屬三千上下此罪無僭亂辭勿用不行惟察惟法其審克之墨刻顙而涅之也劓割鼻也剕刖足也宫淫刑也男子割勢婦人幽閉大辟死刑也六兩曰鍰閲視也倍二百鍰也倍差倍而又差五百鍰也屬類也三千總計之也周禮司刑所掌五刑之屬二千五百刑雖增舊然輕罪比舊為多而重罪比舊為減也比附也罪無正律則以上下是刑而比附其罪也或曰亂辭辭之不可聽者不行舊有法而今不行者戒其無差誤於僣亂之辭勿用今所不行之法惟詳明法意而審克之也按臯陶所謂罪疑惟輕者降一等而罪之耳今五刑疑赦而直罰之以金是大辟宫剕劓墨皆不復降等用矣蘇氏謂五刑疑各入罰當因古制非也舜之贖刑宫府學校鞭撲之刑耳夫刑莫輕於鞭撲入於鞭撲之刑而又情法猶有可議者則是無法以治之故使之贖特不欲遽釋之也而穆王之所謂贖雖大辟亦贖也舜豈有是刑哉詳見篇題音釋經辟毗亦反下並同鍰胡關反剕父沸反差初加反比卑履反傳涅乃結反刖音月宫淫刑孔疏云宫刑主為淫者然後人被此罪非必皆云淫漢除肉刑宫刑猶在至隋開皇初方除男子宫刑周禮司刑墨劓宫剕殺罪各五百復扶又反夫音扶治平聲上刑適輕下服下刑適重上服輕重諸罰有權刑罰世輕世重惟齊非齊有倫有要事在上刑而情適輕則服下刑舜之宥過無大康誥所謂大罪非終者是也事在下刑而情適重則服上刑舜之刑故無小康誥所謂小罪非眚者是也若謂罰之輕重亦皆有權焉權者進退推移以求其輕重之宜也刑罰世輕世重者周官刑新國用輕典刑亂國用重典刑平國用中典隨世而為輕重者也輕重諸罰有權者權一人之輕重也刑罰世輕世重者權一世之輕重也惟齊非齊者法之權也有倫有要者法之輕也言刑罰雖惟權變是適而齊之以不齊焉至其倫要所在蓋有截然而不可紊者矣此兩句總結上意三山陳氏曰膠固以為齊非齊也如上罪服上刑下罪服下刑前世刑輕今亦輕前世刑重今亦重此惟齊也殊不知情有輕重時有治亂安得而齊之乃所以為不齊耳不若歸之倫理要會蓋人情世變皆無一定惟理則無有不定者苟知倫要則知權變矣音釋經下服上亥駕反上服上是掌反傳推通回反罰懲非死人極于病非佞折獄惟良折獄罔非在中察辭于差非從惟從哀敬折獄明啓刑書胥占咸庶中正其刑其罰其審克之獄成而孚輸而孚其刑上備有并兩刑罰以懲惡雖非致人於死地然民重出贖亦甚病矣佞口才也非口才辨給之人可以折獄惟溫良長者視民如傷者能折獄而無不在中也此言聽獄者當擇其人也察辭於差者辭非情實終必有差聽獄之要必於其差而察之非從惟從者陳氏大猷曰從猶服也吾因其差而差之則其情悉見雖巧辨不服從者亦服從矣哀敬折獄者惻怛敬畏以求其情也明啓刑書胥占者言詳明法律而與衆占度也咸庶中正者皆庶幾其無過忒也於是刑之罰之又當審克之也此言聽獄者當盡其心也若是則獄成於下而民信之獄輸於上而君信之其刑上備有并兩刑者言上其斷獄之書當備情節一人而犯兩事罪雖從重亦并兩刑而上之也此言讞獄者當備其辭也音釋經差初加反占之亷反上是掌反并去聲傳長上聲度達各反於上如字言上是掌反下同斷都玩反讞語蹇反又魚戰魚列二反議罪也王曰嗚呼敬之哉官伯族姓朕言多懼朕敬于刑有德惟刑今天相民作配在下明清于單辭民之亂罔不中聽獄之兩辭無或私家于獄之兩辭獄貨非寶惟府辜功報以庶尤永畏惟罰非天不中惟人在命天罰不極庶民罔有令政在于天下此總告之也官典獄之官也伯諸侯也族同姓姓異姓也朕之於刑言且多懼况用之乎朕敬于刑者畏之至也有德惟刑者厚之至也今天以刑相治期民汝實任責作配在下可也明清以下敬刑之事也獄辭有單有兩單辭者無證之辭也聽之為尤難明者無一毫之蔽清者無一點之汚曰明曰清誠敬篤至表裏洞徹無少私曲然後能察其情也陳氏大猷曰明清以聽單辭以中而聽兩辭也陳氏櫟曰亂治也民之所以治無不在於以中而聽獄之兩辭耳兩辭之獄無可容私家于獄如君也子不家于喪之家無或以私意而求成家于獄之兩辭獄貨鬻獄而得貨也府聚也辜功猶云罪狀也吕氏曰獄貨非所以為寶貨積而罪亦積乃所以聚汝辜罪之功狀終有時而償報以庶尤而衆罪交至也孔氏曰永畏天惟罰言當長畏懼惟為天所罰也陳氏大猷曰鬻獄而降罰非天道失中蓋獄者乃人命生死之所在所故也苟用刑失中而天罰不至其極則刑典獄者無懲戒自此庶民無有蒙善政而在于天下者矣且任刑之大本在敬與中用刑以敬為主用法以中為主前章已論之至此復提敬與中訓之後章復申以中焉音釋經相去聲令去聲傳汚音烏少始紹反治平聲鬻余六反賣也王曰嗚呼嗣孫今往何監非德于民之中尚明聽之哉哲人惟刑無疆之辭屬于五極咸中有慶受王嘉師監于兹祥刑蘇氏曰王耄矣諸侯多其孫故曰嗣孫孔氏曰今往何監言今當何所監視非當立德于民為之中正乎尚明聽之哉言庶幾明聽我言而行之也哲人惟刑無疆之辭言智人用刑有無窮之善名也新安陳氏曰極多凖則之名折獄能繫屬五刑之凖則所以皆合乎中理而有是慶也或訓極為中固非徑指五極為五刑亦非也嘉師良民也祥刑良法也諸侯受王嘉師監于兹祥刑此申明前告示祥刑之意而欲其監觀於所告之祥刑也毅齋沈氏曰嘗讀冏命吕刑二書竊有感於人心之無常操存之不易蓋穆王一人之身而此心凡三變焉方其命伯冏也既以怵惕惟厲自警復以格其非心責臣罔有不欽之訓嗚呼敬哉之辭其憂思深且長矣此心不繼血氣方盛馭八駿而略四方幾至亡國前日預知警戒者不免躬自蹈之逮其耆頥衰老之際度作刑以訓四方而敬忌敬五刑敬哉之説三四致意焉雖周道自此衰然冏命之書專主乎欽吕刑之書敷主乎敬心法之哉之傳千載猶可想也吁人心操舍存亡之變如此音釋經監音鑒下同屬音燭文侯之命幽王為犬戎所殺晉文侯與鄭武公迎太子宜臼立之是為平王遷於東都平王以文侯為方伯賜以秬鬯弓矢作策書命之史録為篇今文古支皆有吕氏曰此篇作於東遷之初可以上可以下由此而上為成康為文武由此而下為春秋為戰國乃世道消長升降之交會也使平王能復文武成康之遺澤則可以繼二帝三王之盛天下不復為春秋戰國矣惟平王安於苟且因循自是降為列國夫子編此書於二帝三王之後者深惜平王不能推文武之遺澤而流為春秋戰國也法語舊典尚有一二未氓而陵遲頽隳之意已見於詞命間學者當審察而明辨也王若曰父義和丕顯文武克愼明德昭升于上敷聞在下惟時上帝集厥命于文王亦惟先正克左右昭事厥辟越小大謀猷罔不率從肆先祖懷在位同姓故稱父文侯名仇義和其字不名者尊之也丕顯者言其德之所成克愼者言其德之所修昭升敷聞言其德之所至也文武之德如此故上帝集厥命於文王亦惟爾祖父能左右昭事其君於小大謀猷無敢背違故先王得安在位音釋經聞音問又如字左右音佐佑辟必益反傳背音佩嗚呼閔豫小子嗣造天丕愆殄資澤于下民侵戎我國家純即我御事罔或耆夀俊在厥服豫則罔克曰惟祖惟父其伊恤朕躬嗚呼有績豫一人永綏在位歎而自痛傷也閔憐也嗣造天丕愆者嗣位之初為天所大譴父死國敗也殄絶純大也絶其資用惠澤於下民本既先撥故戎狄侵陵為我國家之害甚大今我御事之臣無有老成俊傑在厥官者而我小子又材劣無能其何以濟難故又言諸侯在我祖父之列者其誰能恤我乎又歎息言有能致功豫一人則可永安厥位矣蓋悲國之無人無有如上文先正之昭事而先王得安在位也音釋傳濟難並去聲父義和汝克昭乃顯祖汝肇刑文武用會紹乃辟追孝于前文人汝多修扞我于艱若汝豫嘉顯祖文人皆謂唐叔即上文先正昭事厥辟者也夏祖氏曰爾祖有功周室今爾有功於我是汝能昭揚其也後罔或耆夀俊在厥服則刑文武之道絶矣今刑文武自文侯始故曰肇刑文武會者合之而使不離紹者繼之而使不絶前文人猶云前寧人汝多所修完扞衛我于艱難若汝之功我所嘉美也音釋經辟必益反扞侯旰反王曰父義和其歸視爾師寧爾邦用賚爾秬鬯一卣彤弓一彤矢百盧弓一盧矢百馬四匹父往哉柔遠能邇惠康小民無荒寧簡恤爾都用成爾顯德師衆也黑黍白秬釀以鬯草卣中尊也諸侯受錫命當告其始祖故賜鬯也彤赤盧黑也諸侯有大功賜弓矢然後得專征伐馬供武用四匹曰乘侯伯之賜無常以功大小為度也簡者簡閲其士恤者惠恤其民都者國之都鄙也蘇氏曰豫讀文侯篇知東周之不復興也宗周傾覆禍敗極矣平王宜若衛文公越勾踐然今其書乃旋旋焉與平康之世無異春秋傳曰厲王之禍諸侯釋位以間王室宣王有志而後效官讀文侯之命知平王之無志也按史記幽王娶於申而生太子宜臼後幽王娶褒姒廢申后去太子申侯怒與繒西夷犬戎攻王而殺之諸侯即申侯而立故太子宜臼是為平王平王以申侯立己為有德而忘其弒父為當誅方將以復讎討賊之衆而為戌申戌許之舉其忘親背義得罪於天者已甚矣何怪其委靡頽墮而不自振也哉然則是命也孔子以其猶能言文武之舊而存之歟抑亦以示戒於天下後世而存之歟音釋傳釀汝亮反酒成而和以鬱非以鬱釀也供音恭乘去聲復扶又反旋旬緣反隨戀反旋旋然謂和緩也間去聲去上聲繒慈陵反國名背音佩費誓費地名淮夷徐戎並起為寇魯侯征之於費誓衆故以費誓名篇今文古文皆有吕氏曰伯禽撫封於魯夷戎妄意其未更事且乘其新造之隙而伯禽應之者甚整暇有序先治戎備次之以除道路又次之以嚴部伍又次之以立期會先後之序皆不可紊又按費誓泰誓皆侯國之事而繫於帝王書末者猶詩之録商頌魯頌也音釋經費音祕古文作史記作肹本魯附庸國後并於魯今沂州費縣西有占費城去曲阜故城三百里傳更平聲乘平聲治平聲公曰嗟人無譁聽命徂兹淮夷徐戎並興孔氏曰徐戎淮夷並起寇魯伯禽為方伯帥諸侯之師以征歎而敕之使無喧譁欲其靜聽誓命蘇氏曰淮夷叛已久矣及伯禽就國又脅徐戎並起故曰徂兹淮夷徐戎並興孔氏曰徂兹者言往征伐此戎夷也音釋經無與毋通後除無餘刑之無餘並同傳帥音率脅並業反善􅙀乃甲胄敿乃干無敢不弔備乃弓矢鍛乃戈矛礪乃鋒刃無敢不善􅙀縫完也縫完其甲胃勿使斷毁孔氏曰干楯敿施楯紛也唐孔氏曰紛如綬而小繫於楯以持之也弔精至也鍛淬礪磨也甲胄所以衛身弓矢戈豫所以克敵先自衛而後攻人亦其序也音釋經􅙀連條反敿舉夭反弔音的鍛都玩反礪力制反傳縫符容反楯竪尹反紛敷文反淬取內反燒而納水中以堅之也今惟淫舍牿牛馬杜乃擭敜乃穽無敢傷牿牿之傷汝則有常刑吕氏曰戎備既修則師可出故繼以除道路修飭廬舍也淫舍謂星列周廬無傷牿謂無傷所舍之牿牛羈馬也孔氏曰淫大舍放也吕氏曰牿間也不用兵則馬在間廏用兵則牛駕車馬服乘皆散於外也孔氏曰杜塞也擭捕獸機檻敜窒也穽穿地以陷獸者師既出當窒塞其擭穽一或不謹而傷牿之牛馬則有常刑此令軍在所之居民也舉此例之凡川梁藪澤險阻屏翳有害於師屯者皆在矣此除道路之事音釋經舍如字牿姑沃反擭胡化反張參五經文字音寒步烏郭二反云非鄂也穽淺則施敜諾協乃結二反穽疾郢疾正二反傳檻户黤反闌也圈也令去聲屏必郢反馬牛其風臣妾逋逃勿敢越逐祗復之我商賚汝乃越逐不復汝則有常刑無敢寇攘踰垣牆竊馬牛誘臣妾汝則有常刑吕氏曰師既出則部伍當嚴自古喪師每因剽掠失伍為敵所乘也賈逵曰牝牡相誘曰風後人賤者男曰臣女曰妾馬牛風逸臣妾逋亡不敢越軍壘而逐之祗復之而已我商賚汝言我商度多寡以賞汝也若或越度而失伍不復則有常刑也如或寇攘踰垣墻竊馬牛誘臣妾者亦有常刑此嚴伍之事音釋傳風逸孔疏云牝牡相誘曰風因牝牡相逐而至放逸逺去也甲戌我惟征徐戎峙乃糗糧無敢不逮汝則有大刑甲戌用兵之期也吕氏曰部伍嚴則兵可用矣故於此立期會也戎夷並興今獨攻徐戎者蓋量敵之堅瑕緩急而攻之也蔡氏元度曰征者上伐下也敵國不相征也言征則是承王命率諸侯以征之也孔氏曰峙儲峙糗乾糧逮及大刑死刑音釋經峙丈理反糗去九反説文云熬米麥也傳量平聲魯人三郊三遂峙乃楨幹甲戌我惟築無敢不供汝則有無餘刑非殺唐孔氏曰指言魯人明更有他國之人也林氏曰國有四郊郊外為遂夷戎為寇東郊受敵故使東民專意攻守而調發儲峙則使西南北三郊三遂之民蓋取給於不受敵之地也楨幹版築之木題曰楨牆端之木也旁曰幹牆兩邉障土者也以是日征是日築者彼方禦我之攻勢不得擾我之築也無餘刑非殺者刑之非一但不至於殺耳音釋經楨音貞供音恭傳題額也障之亮反魯人三郊三遂峙乃芻茭無敢不多汝則有大刑楨幹芻茭獨言魯人者地近而致便也説文曰芻刈草也茭乾芻也吕氏曰糗糧人食芻茭馬食視楨幹尤急故其刑不同林氏曰刑非聖賢所忍言者至用兵則不厭於三令五申所以重戎事而全民命也音釋經芻窗俞反茭音交秦誓左傳杞子自鄭使告于秦曰鄭人使我掌其北門之管若潛師以來國可得也穆公訪諸蹇叔蹇叔曰不可公辭焉使孟明西乞白乙伐鄭晉襄公帥師敗秦師于殽囚其三帥穆公悔過誓告羣臣史録為篇今文古文皆有音釋傳公帥音率殽何交反地名在𢎞農邵澠池縣西三帥所類反事見左傳僖公三十三年公曰嗟我士聽無譁豫誓告汝羣言之首首之為言第一義也將舉古人之言故先發此音釋經無與母通古人有言曰民訖自若是多盤責人斯無難惟受責俾如流是惟艱哉訖盡盤安也凡人盡自若是多安於徇己其責人無難惟受責於人俾如流水略無扞格是惟艱哉穆公悔前日安於自徇而不聽蹇叔之言深有味於古人之語故舉為誓言之首也仁山金氏曰穆公引古人之言意主受責盤其病源如盤樂怠傲之盤人惟多盤所以樂放憚憸喜邪忌正不能受責也下文我心之憂日月逾邁若弗云來正接多盤之戒音釋傳扞格上侯旰反下胡客反不可入也我心之憂日月逾邁若弗云來陳氏大猷曰逾過也邁行速也憂歲月之迅逝恐追悔無及也惟古之謀人則曰未就豫忌惟今之謀人姑將以為親雖則云然尚猷詢茲黃髮則罔所愆忌疾姑且也古之謀人老成之士也今之謀人新進之士也非不知其為老成以其不就已而忌病之非不知其新進姑樂其順便而親信之前日之過雖已云然然尚謀詢兹黃髮之人則庶罔有所愆蓋悔其既往之失而冀其將來之善也音釋傳樂音洛番番良士旅力既愆我尚有之仡仡勇夫射御不違我尚不欲惟截截善諞言俾君子易辭我皇多有之番番老貌仡仡勇貌截截辨貌諞巧也皇遑通膂力既愆之良士前日所詆墓木既拱者我猶庶幾得而有之射御不違之勇夫前日所誇過門超乘者我庶幾不欲用之勇夫我尚不欲則辨給善巧言能使君子變易其辭説者我遑暇多有之哉良士謂蹇叔勇夫謂三帥諞言謂杞子先儒皆謂穆公悔用孟明詳其誓意蓋深悔用杞子之言也音釋經番音波旅朱詩傳云與膂通脊骨也仡魚乞反射神夜反諞毗連俾緬二反易夷益反傳乘去聲昧昧我思之如有一介臣斷斷猗無他技其心休休焉其如有容人之有技若已有之人之彥聖其心好之不啻如自其口出是能容之以保我子孫黎民亦職有利哉昧昧而思者深潛而靜思也介獨也大學作個斷斷誠一之貌猗語辭大學作兮休休易直好善之意容有受也彥美士也聖通明也技才聖德也心之所好甚於口之所言也職主也音釋經介音界陸云本又作個斷都玩反猗於宜反又於猗反好去聲傳易以䜴反好去聲下同人之有技冒疾以惡之人之彥聖而違之俾不達是不能容以不能保我子孫黎民亦曰殆哉冒大學作媢忌也孔氏曰疾害也陳氏大猷曰惡憎違背也不達俾才德者不能通逹也蘇氏曰至哉穆公之論此二人也前一人似房玄齡後一人似李林甫後之人主監此足矣音釋經惡去聲傳媢音冒背音佩監音鑒邦之杌隉曰由一人邦之榮懷亦尚一人之慶張氏曰杌如木之動搖隉如阜之圯壞杌隉不安也懷安也言國之危殆係乎所任一人之非國之榮安係乎所任一人之是申繳上二章意陳氏大猷曰穆公深悔前日用人之失故思得有容之士以輔相之也張氏九成曰孔子深意若曰平王錫文侯而言不及復讎王道不可望矣天下之讎莫大於弒君父天下之惡莫大乎安於為弒逆者所立事至於此王道絶矣夫子之意謂使平王用兵得如伯禽申侯犬戎庶可誅乎悔過得如秦穆懲創用賢周庶幾其中興乎今皆無之故痛憤而以伯禽穆公繼其後也李氏謹思曰或謂周書終於文侯之命而以秦誓附焉蓋世變往來之會王伯升降之機書終文侯之命而王迹熄書附秦誓而伯圖興周遷洛邑而周日弱秦得鎬京而秦日強讀文侯之命見平王忘君父忘讎耻也如此讀秦誓見穆公之改過遷善任賢去邪也如此周欲不弱秦欲不強得平平王之詩下儕列國而秦車鄰附見焉平王之書續以列國而秦誓附見焉進秦於詩書之末以警周也春秋之筆於秦每人之又且狄之又以尊周也天下之勢駸駸而趨於秦夫子得不見其幾微於定書刪詩作春秋之際乎音釋經杌五忽反隉倪結反傳繳古了反書傳會選卷六
